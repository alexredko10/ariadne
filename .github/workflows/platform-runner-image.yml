# ---------------------------------------------------------------------------
# platform-runner image — build and publish workflow
#
# Builds the platform-runner image for PR validation and publishes
# to GitHub Container Registry (GHCR) on main/tag pushes.
#
# Security constraints (see ADR 0002):
#   - no Docker Hub
#   - no Artifactory
#   - no PATs or long-lived credentials
#   - no docker.sock mount
#   - no privileged containers
#   - no host secret mounts
#   - no publishing from pull_request
#   - no secrets in pull_request jobs
# ---------------------------------------------------------------------------

name: platform-runner image

on:
  pull_request:
    paths:
      - ".github/workflows/platform-runner-image.yml"
      - "docker/platform-runner/**"
      - ".project-memory/pr/0009-platform-runner-ghcr-workflow/PLAN.md"
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths:
      - ".github/workflows/platform-runner-image.yml"
      - "docker/platform-runner/**"
      - ".project-memory/pr/0009-platform-runner-ghcr-workflow/PLAN.md"

# Default workflow-level permissions are read-only.
# Publishing job requests packages: write explicitly.
permissions:
  contents: read

env:
  # Default registry target for this image.
  # If GHCR rejects the nested path, fall back to:
  #   ghcr.io/${{ github.repository_owner }}/platform-runner
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ariadne/platform-runner

jobs:

  # -----------------------------------------------------------------------
  # PR validation — build only, no push, no login, no secrets
  # -----------------------------------------------------------------------
  build-pr:
    name: Build platform-runner image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without publishing
        uses: docker/build-push-action@v7
        with:
          context: docker/platform-runner
          file: docker/platform-runner/Dockerfile
          platforms: linux/amd64
          push: false
          tags: platform-runner:pr-${{ github.event.pull_request.number }}

  # -----------------------------------------------------------------------
  # Publish to GHCR — only on trusted main/tag pushes
  # -----------------------------------------------------------------------
  publish-ghcr:
    name: Publish platform-runner image to GHCR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    environment: ghcr-publish
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Publishing uses GITHUB_TOKEN with packages: write.
      # If repository/org settings block GHCR publishing with GITHUB_TOKEN,
      # do not add a PAT in this workflow. Any fallback secret requires
      # explicit human approval and must not be used for pull_request jobs.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: docker/platform-runner
          file: docker/platform-runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
