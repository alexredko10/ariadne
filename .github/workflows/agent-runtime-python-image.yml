# ---------------------------------------------------------------------------
# agent-runtime-python image — build and publish workflow
#
# Builds the agent-runtime-python image for PR validation and publishes
# to GitHub Container Registry (GHCR) on main/tag pushes.
#
# Security constraints (see PLAN.md and ADR 0002):
#   - no Docker Hub
#   - no Artifactory
#   - no PATs or long-lived credentials
#   - no docker.sock mount
#   - no privileged containers
#   - no host secret mounts
#   - no publishing from pull_request
#   - no secrets in pull_request jobs
# ---------------------------------------------------------------------------

name: agent-runtime-python image

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Default workflow-level permissions are read-only.
# Publishing job requests packages: write explicitly.
permissions:
  contents: read

env:
  # Default registry target for this image.
  # If GHCR rejects the nested path, fall back to:
  #   ghcr.io/${{ github.repository_owner }}/agent-runtime-python
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ariadne/agent-runtime-python

jobs:

  # -----------------------------------------------------------------------
  # PR validation — build only, no push, no login, no secrets
  # -----------------------------------------------------------------------
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation only, no push)
        uses: docker/build-push-action@v6
        with:
          context: docker/agent-runtime-python
          file: docker/agent-runtime-python/Dockerfile
          platforms: linux/amd64
          push: false

  # -----------------------------------------------------------------------
  # Publish to GHCR — only on trusted main/tag pushes
  # -----------------------------------------------------------------------
  publish-ghcr:
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    environment: ghcr-publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Publishing uses GITHUB_TOKEN with packages: write.
      # If repository/org settings block GHCR publishing with GITHUB_TOKEN,
      # do not add a PAT in this workflow. Any fallback secret requires
      # explicit human approval and must not be used for pull_request jobs.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker/agent-runtime-python
          file: docker/agent-runtime-python/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
