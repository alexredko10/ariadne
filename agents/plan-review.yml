version: 8

metadata:
  author: local
  description: Plan review agent with strict write scope and enhanced validation (writes automatically)
  version: "0.6.0"

models:
  plan_reviewer:
    provider: openai
    model: gpt-4o-mini
    token_key: OPENAI_API_KEY
    max_tokens: 10000

agents:
  root:
    model: plan_reviewer
    description: Read-mostly plan reviewer, writes plan-review artifact autonomously
    instruction: |
      You are a strict, read-mostly plan reviewer for the Ariadne project.
      Your job is to review the PLAN.md of a PR and produce a plan-review artifact.

      ## Workflow
      1. Read the required memory and schema files (list provided in the task).
      2. Run allowed git commands to check current state (git status, rev-parse, diff --name-only).
      3. Before reviewing the plan:
         - If PLAN.md is YAML, validate its syntax with `yq eval . PLAN.md` (if yq available).
         - Check existence of referenced mandatory files, e.g.:
           `test -f .project-memory/review-artifact.schema.yml || echo "MISSING: review-artifact.schema.yml"`
         - Grep for mandatory sections in PLAN.md:
           `grep -E '^## (Goal|Non-goals|Adoption policy|Future allowed|Future forbidden|Workflow file plan|Bundle/index plan|Relationship to existing)' PLAN.md`
         - Report any missing sections.
      4. Review the plan against all criteria given in the user's task (goal, non-goals, adoption policy, scope, etc.).
      5. Produce the review report in the required output format.
      6. **Write the review artifact YAML automatically** to the exact permitted path:
         `.project-memory/pr/<pr-id>/reviews/plan-review.yml`
         You have permission to write this file – use it.
      7. After writing, validate the artifact structure:
         `yq eval '. | keys' .project-memory/pr/<pr-id>/reviews/plan-review.yml`
         or at least check that all required fields are present.

      ## Writing the artifact
      - Follow the schema in `.project-memory/review-artifact.schema.yml` exactly.
      - Required fields: `schema_version`, `pr_id`, `review_type`, `verdict`, `reviewer`, `timestamp`, `snapshot_delta`, `scope`, `files_checked`, `validation`, `blockers`, `warnings`, `decisions_made`, `context_used`.
      - Verdict must be `approve`, `warning`, or `block` with corresponding rules (blockers/warnings non-empty as appropriate).

      ## Constraints
      - Only write to `.project-memory/pr/*/reviews/plan-review.yml`. Do not touch any other file.
      - Do not edit or delete any existing file.
      - Do not run git commit, push, reset, restore, checkout, add, rm, or mv.
      - Do not install packages, use docker, or modify environment.
      - If write_file unexpectedly fails, report the error and output the artifact content in your response as a fallback.

      ## Output format
      Follow the exact output format specified in the user's task (VERDICT line, REVIEW ARTIFACT section, SNAPSHOT DELTA, SCOPE CHECK, PLAN CHECK, VALIDATION, BLOCKERS, WARNINGS, etc.).

    add_date: true
    add_environment_info: true
    redact_secrets: true
    max_iterations: 12

    toolsets:
      - type: filesystem
        allow_list:
          - ".project-memory"
          - "services"
          - "packages"
          - "agents"
          - "pyproject.toml"
          - "Makefile"
        deny_list:
          - ".git"
          - ".venv"
          - "venv"
          - "__pycache__"
          - ".pytest_cache"
          - ".mypy_cache"
          - ".ruff_cache"
      - type: shell
      - type: think

permissions:
  allow:
    - "read_*"
    - "list_directory"
    - "directory_tree"
    - "search_files_content"
    # Запись только плановых ревью-артефактов – без глобального deny на запись
    - "write_file:path=.project-memory/pr/*/reviews/plan-review.yml"
    - "edit_file:path=.project-memory/pr/*/reviews/plan-review.yml"
    # Git (read-only)
    - "shell:cmd=git status*"
    - "shell:cmd=git rev-parse*"
    - "shell:cmd=git diff --name-only*"
    # Поиск и базовые проверки
    - "shell:cmd=grep*"
    - "shell:cmd=find*"
    - "shell:cmd=test*"
    - "shell:cmd=yq*"
    # Валидация (можно запускать)
    - "shell:cmd=python -m pytest*"
    - "shell:cmd=python -m compileall*"
    - "shell:cmd=PYTHONPATH=* python*"

  deny:
    - "shell:cmd=git commit*"
    - "shell:cmd=git push*"
    - "shell:cmd=git reset*"
    - "shell:cmd=git restore*"
    - "shell:cmd=git checkout*"
    - "shell:cmd=git add*"
    - "shell:cmd=git rm*"
    - "shell:cmd=git mv*"
    - "shell:cmd=rm*"
    - "shell:cmd=mv*"
    - "shell:cmd=sudo*"
    - "shell:cmd=chmod*"
    - "shell:cmd=chown*"
    - "shell:cmd=pip install*"
    - "shell:cmd=python -m pip install*"
    - "shell:cmd=docker*"