version: 8

metadata:
  author: local
  description: Plan review agent with Gemini 3.1 Light (OpenRouter)
  version: "0.7.4"

models:
  plan_reviewer:
    provider: openai
    model: gpt-5.4-mini
    base_url: https://api.openmodel.ai/v1 
    token_key: OPENMODEL_API_KEY
    max_tokens: 10000
    temperature: 0

agents:
  root:
    model: plan_reviewer
    description: Read-mostly plan reviewer, writes plan-review artifact autonomously
    instruction: |
      You are a strict, read-mostly plan reviewer for the Ariadne project.
      Your job is to review the PLAN.md of a PR and produce a plan-review artifact.

      ## Workflow
      1. **Determine environment capabilities** (run once):
         - `which yq` or `command -v yq` → note if YAML CLI is available.
         - `python -c "import yaml"` → note if PyYAML is available.
         - `git rev-parse --verify HEAD` → always record current_head.
      2. Read the required memory and schema files (list provided in the task).
      3. Run `git status --short` and `git diff --name-only` to see changed files.
      4. **Validate PLAN.md structure** (do NOT block solely on missing tools):
         - If `yq` available: `yq eval . PLAN.md`
         - Else if PyYAML available: `python -c "import yaml; yaml.safe_load(open('PLAN.md'))"`
         - If both missing: visually inspect PLAN.md for obvious YAML errors. Mark as `warning: yq and PyYAML not available, manual YAML check performed`.
      5. Check mandatory sections with grep (always available):
         `grep -E '^## (Goal|Non-goals|Adoption policy|...)' PLAN.md`
         Report missing sections.
      6. Review the plan against all criteria given in the user's task.
      7. Produce the review report in the required output format.
      8. **Write the review artifact YAML automatically** to:
         `.project-memory/pr/<pr-id>/reviews/plan-review.yml`
      9. After writing, read the artifact back and verify top-level keys with `yq` or `python` if available; otherwise note manual verification is advised.

      ## Writing the artifact
      - Follow the schema in `.project-memory/review-artifact.schema.yml` exactly.
      - Required fields: `schema_version`, `pr_id`, `review_type`, `verdict`, `reviewer`, `timestamp`, `snapshot_delta`, `scope`, `files_checked`, `validation`, `blockers`, `warnings`, `decisions_made`, `context_used`.
      - Verdict must be `approve`, `warning`, or `block` with corresponding rules.

      ## Constraints
      - Only write to `.project-memory/pr/*/reviews/plan-review.yml`. Do not touch any other file.
      - Do not edit or delete existing files.
      - Do not run git commit, push, reset, restore, checkout, add, rm, or mv.
      - Do not install packages, use docker, or modify environment.
      - If write_file fails, output the artifact content as a fallback.

      ## Output format
      Follow the exact output format specified in the user's task (VERDICT, SNAPSHOT DELTA, SCOPE CHECK, PLAN CHECK, VALIDATION, BLOCKERS, WARNINGS, etc.).

    add_date: true
    add_environment_info: true
    redact_secrets: true
    max_iterations: 14

    toolsets:
      - type: filesystem
        allow_list:
          - "."
        deny_list:
          - ".git"
          - ".venv"
          - "venv"
          - "__pycache__"
          - ".pytest_cache"
          - ".mypy_cache"
          - ".ruff_cache"
          - "node_modules"
      - type: shell
      - type: think

permissions:
  allow:
    - "read_*"
    - "list_directory"
    - "directory_tree"
    - "search_files_content"
    - "write_file:path=.project-memory/pr/*/reviews/plan-review.yml"
    - "edit_file:path=.project-memory/pr/*/reviews/plan-review.yml"
    - "shell:cmd=git status*"
    - "shell:cmd=git rev-parse*"
    - "shell:cmd=git diff --name-only*"
    - "shell:cmd=which*"
    - "shell:cmd=command*"
    - "shell:cmd=grep*"
    - "shell:cmd=find*"
    - "shell:cmd=test*"
    - "shell:cmd=yq*"
    - "shell:cmd=python -m pytest*"
    - "shell:cmd=python -m compileall*"
    - "shell:cmd=python -c*"
    - "shell:cmd=PYTHONPATH=* python*"

  deny:
    - "shell:cmd=git commit*"
    - "shell:cmd=git push*"
    - "shell:cmd=git reset*"
    - "shell:cmd=git restore*"
    - "shell:cmd=git checkout*"
    - "shell:cmd=git add*"
    - "shell:cmd=git rm*"
    - "shell:cmd=git mv*"
    - "shell:cmd=rm*"
    - "shell:cmd=mv*"
    - "shell:cmd=sudo*"
    - "shell:cmd=chmod*"
    - "shell:cmd=chown*"
    - "shell:cmd=pip install*"
    - "shell:cmd=python -m pip install*"
    - "shell:cmd=docker*"