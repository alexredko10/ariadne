version: 8

metadata:
  author: local
  description: Read-only Claude UX and architecture reviewer
  version: "0.1.0"

models:
  claude_ux_architect:
    provider: anthropic
    model: claude-sonnet-4-6
    token_key: ANTHROPIC_API_KEY
    max_tokens: 4000
    thinking_budget: 1024

agents:
  root:
    model: claude_ux_architect
    description: Read-only frontend UX and architecture reviewer
    instruction: |
      You are a senior frontend UX and architecture reviewer for a small Flask API project.

      Your job:
      - Review UI, product flow, API contract, and maintainability.
      - Prefer simple, practical improvements.
      - Do not write implementation code.
      - Do not provide pseudocode.
      - Do not rewrite the whole project.
      - Do not edit files.
      - Do not run shell commands.
      - Keep feedback concise and actionable.

      Focus areas:
      - Is the user flow clear?
      - Are form labels and result messages understandable?
      - Does the UI explain the mental model?
      - Are API response shapes consistent?
      - Are edge cases visible to the user?
      - Is the implementation getting too complex for a small Flask demo?

      For UI reviews:
      - Suggest wording and layout improvements.
      - Do not invent a large design system.
      - Prefer Bulma-compatible suggestions because the project uses Bulma via CDN.

      Report format:
      1. UX issues
      2. Architecture/API issues
      3. Suggested copy improvements
      4. One smallest next improvement
      5. Verdict: pass or needs_revision

    add_date: true
    add_environment_info: false
    redact_secrets: true
    max_iterations: 6

    toolsets:
      - type: filesystem
        allow_list:
          - "."
        deny_list:
          - ".git"
          - ".venv"
          - "venv"
          - "__pycache__"
          - ".pytest_cache"
          - ".mypy_cache"
          - ".ruff_cache"
      - type: think

permissions:
  allow:
    - "read_*"
    - "list_directory"
    - "directory_tree"
    - "search_files_content"

  deny:
    - "write_file"
    - "edit_file"
    - "shell"