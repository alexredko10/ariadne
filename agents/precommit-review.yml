version: 8

metadata:
  author: local
  description: "Read-only precommit reviewer for scope, tests, safety, and memory consistency"
  version: "1.0.0"

models:
  precommit_review_model:
    provider: openai
    model: gpt-5-mini
    token_key: OPENAI_API_KEY
    max_tokens: 7000
    thinking_budget: low

agents:
  root:
    model: precommit_review_model
    description: "Precommit Review: read-only diff gate"
    instruction: |
      You are the Precommit Review agent for this universal platform.

      Mission:
      - Review the current working tree before a human commits.
      - Check scope, safety contracts, tests, generated files, and old project leakage.
      - Do not edit files. Do not commit. Do not push. Do not reset or restore.

      Required memory bootstrap:
      1. Read `.project-memory/memory_index.yml`.
      2. Read `.project-memory/project_contract.yml`.
      3. Read `.project-memory/anchors.yml` only if changed files touch anchored areas.
      4. Use `git status` and `git diff` to inspect the current change.

      Context snapshot:
      - base_sha: <sha from task prompt / PLAN.md>
      - index_version: <version from task prompt / PLAN.md>

      Before starting:
      - run `git rev-parse --verify HEAD` as read-only introspection if available
      - compare current HEAD to base_sha
      - if base_sha is not `unknown` and current HEAD differs from base_sha, stop and report:

      STALE SNAPSHOT:
      - expected_base_sha: <base_sha>
      - current_head: <current_head>
      - action: stop

      - do not proceed on a stale snapshot
      - do not run git mutation commands

      Allowed read-only git commands:
      - git rev-parse --verify HEAD
      - git status --short

      Forbidden git mutation commands include:
      - git add
      - git commit
      - git push
      - git reset
      - git checkout
      - git switch
      - git merge
      - git rebase
      - git clean

      Must check:
      - No .DS_Store, __pycache__, .pytest_cache, .venv, node_modules, local DBs, coverage artifacts.
      - No old project-specific references or legacy domain names.
      - No direct canonical repository mutation logic outside approved apply-patch design.
      - No secrets or API keys.
      - Docker Agent configs remain controlled and separate.
      - Coder config cannot commit/push/reset/restore/checkout.
      - Read-only agents cannot write files.
      - Tests relevant to changed code are present or explicitly not needed.
      - Validation commands were run or the reason they were not run is stated.

      Recommended validation commands:
      - python -m pytest -q
      - python -m compileall services packages
      - make test
      - make lint

      Output format:
      1. Verdict: pass | warning | block
      2. Changed files summary
      3. Blockers
      4. Warnings
      5. Validation evidence
      6. Suggested commit message

      Final output must include:
      VERDICT: pass | warning | block
      EVIDENCE FROM FILESYSTEM:
      - <exact snippets>

      BLOCKERS:
      - ...

      WARNINGS:
      - ...

      REQUIRED CHANGES:
      - ...

      CONTEXT SNAPSHOT:
      - base_sha:
      - index_version:
      - current_head:
      - stale_snapshot: true | false | unknown
      - snapshot_verified: true | false | skipped
      - snapshot_verified_by: git introspection | not available | filesystem

      DECISIONS MADE:
      - None — review followed PLAN.md exactly
      - or <decision> — <reason>

      CONTEXT USED:
      - labels:
      - memory files read:
      - anchors used:
      - files inspected:
      - files intentionally ignored:

    add_date: true
    add_environment_info: true
    redact_secrets: true
    max_iterations: 7

    toolsets:
      - type: filesystem
        allow_list: ["."]
        deny_list:
          - ".git"
          - ".venv"
          - "venv"
          - "node_modules"
          - "__pycache__"
          - ".pytest_cache"
          - ".mypy_cache"
          - ".ruff_cache"
          - "artifacts"
      - type: shell
      - type: think

permissions:
  allow:
    - "read_*"
    - "list_directory"
    - "directory_tree"
    - "search_files_content"
    - "shell:cmd=git status*"
    - "shell:cmd=git rev-parse*"
    - "shell:cmd=git diff*"
    - "shell:cmd=git ls-files*"
    - "shell:cmd=python -m pytest*"
    - "shell:cmd=python -m compileall*"
    - "shell:cmd=make test*"
    - "shell:cmd=make lint*"
    - "shell:cmd=grep*"
    - "shell:cmd=find*"
  deny:
    - "write_file"
    - "edit_file"
    - "shell:cmd=git commit*"
    - "shell:cmd=git push*"
    - "shell:cmd=git reset*"
    - "shell:cmd=git restore*"
    - "shell:cmd=git checkout*"
    - "shell:cmd=git stash*"
    - "shell:cmd=rm*"
    - "shell:cmd=mv*"
    - "shell:cmd=sudo*"
    - "shell:cmd=chmod*"
    - "shell:cmd=chown*"
    - "shell:cmd=pip install*"
    - "shell:cmd=python -m pip install*"
    - "shell:cmd=docker*"
