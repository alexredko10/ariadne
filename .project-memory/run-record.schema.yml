# Run Record Schema v0.1 — Hardened (PR 0019)
# Canonical per-PR run record path pattern: .project-memory/pr/<PR-ID>/run_record.yml
# Run record kind: per-PR aggregate with ordered runs: list (newest-last)
# Apply Gate dependency: run_record_path + run_id references must resolve uniquely

schema_version: "0.1"

# ============================================================
# run_record_reference semantics
# Used by Apply Gate (.project-memory/apply-gate.schema.yml)
# to resolve a run item that authorized a canonical write.
# ============================================================
run_record_reference:
  run_record_path: ".project-memory/pr/<PR-ID>/run_record.yml"
  run_id: "<string>"
  required: true
  uniqueness_scope: "within one run_record.yml"
  resolution_rule: "runs[] must contain exactly one item with matching run_id"

# --- Reference rules ---
# run_record_path must be a repo-relative POSIX path.
# run_record_path must match .project-memory/pr/<PR-ID>/run_record.yml.
# run_id must be present and non-empty.
# run_id must be unique within runs[] of that file.
# runs[] must contain exactly one item matching run_id.
#
# ApplyRequest reference is invalid if:
# - run_record_path is missing or empty
# - run_record_path is malformed
# - run_id is missing or empty
# - run_id appears more than once in runs[]
# - runs[] is missing or empty
# - run_id is not found in runs[]
# - run_record_path points outside .project-memory/pr/<PR-ID>/run_record.yml

# --- Top-level fields ---
# schema_version: string, e.g. "0.1"
# pr_id: string, e.g. "0019"
# pr_slug: string, e.g. "run-record-schema-hardening"
# runs: ordered list of run items (append-only, newest-last)

# --- Per-run-item required fields ---
required_run_fields:
  - run_id
  - agent
  - mode
  - author_type
  - base_sha
  - base_sha_source
  - index_version
  - index_version_source
  - current_head
  - stale_snapshot
  - snapshot_verified
  - snapshot_verified_by
  - files_changed
  - validation_results
  - decisions
  - deviations
  - confirmations
  - context_used

# --- Backward-compatible aliases (schema v0.1) ---
# Canonical field: decisions
# Alias (valid): decisions_made
#
# Canonical field: deviations
# Alias (valid): deviations_from_plan
#
# Both names are valid in schema v0.1.
# Future schema versions may drop aliases.

# --- Optional fields ---
optional_run_fields:
  - created_at

# --- created_at rule ---
# Optional in schema v0.1.
# If present, must be ISO8601 UTC.
# Absence does not invalidate schema v0.1.

# --- run_id rule ---
# Required.
# Must be unique within one PR run_record.yml.
# Recommended format: <PR-ID>-<phase>-<agent>-<sequence>
# Examples: 0017-plan-coder-001, 0017-review-plan-review-001

# --- Ordering rules ---
# runs[] ordered newest-last.
# decisions are ordered.
# deviations are ordered.
# Append-only run entries are preferred.
# Rewriting existing run entries is forbidden except explicit human correction in a reviewed PR.

# --- Path rule ---
# All file path fields must be repo-relative POSIX paths.
# Example: services/runner/src/...
# Not: /absolute/path or ./relative
# Absolute paths are forbidden.
# Backslash Windows-style paths are forbidden.
# Paths escaping the repository root are forbidden.

# --- File path fields (must be repo-relative POSIX) ---
# files_changed[].path
# context_used.files_inspected[]
# context_used.files_modified[]
# context_used.files_intentionally_ignored[]
# context_used.memory_files_read[]

# --- Validation evidence rule ---
# Sanitized: no secrets, credentials, tokens.
# Bounded: maximum 2000 characters.
# No full environment dumps or full logs.
# Prefer short evidence: "72 passed", "compileall clean", "doctor passed"

# --- validation_results ---
# Each entry:
#   command: "<string>"
#   result: "passed | failed | skipped | waived"
#   status: "passed | failed | skipped | waived"
#   evidence: "<short sanitized bounded evidence>"
#
# Rules:
# - each validation entry must have command
# - each validation entry must have result
# - each validation entry must have status
# - allowed status values: passed | failed | skipped | waived
# - waived requires:
#     human_waiver: true
#     waiver_reason: "<string>"
#     waived_by: "<human identifier>"
# - evidence must be sanitized
# - evidence must be bounded
# - evidence max 2000 characters
# - evidence must not contain secrets, credentials, tokens, full environment dumps, or full logs

# --- Enum: snapshot_verified ---
# Values:
#   true       - git rev-parse ran and current_head == base_sha
#   false      - git rev-parse ran and current_head != base_sha
#   skipped    - verification could not run or base_sha was unknown

# --- Enum: snapshot_verified_by ---
# Values:
#   git introspection  - git rev-parse --verify HEAD was used
#   filesystem         - reserved for future non-git verification
#   not available      - no verification mechanism available

# --- Enum: validation_result ---
# Values:
#   passed
#   failed
#   skipped
#   waived

# --- Enum: validation_status ---
# Values:
#   passed
#   failed
#   skipped
#   waived

# --- Enum: stale_snapshot ---
# Values:
#   true      - current_head != base_sha
#   false     - current_head == base_sha
#   unknown   - verification could not run

# --- Enum: author_type ---
# Values:
#   agent
#   human

# --- Safety rules ---
# Run records are evidence, not authority to mutate repo.
# Run records do not grant patch application rights.
# Run records must not contain secrets.
# Run record creation remains human-controlled/manual until automation is explicitly planned.
# No automatic memory writes in this PR.
# No backfilling previous PRs in this PR.

# ============================================================
# Minimal valid run_record.yml example:
# ============================================================
# schema_version: "0.1"
# pr_id: "0019"
# pr_slug: "run-record-schema-hardening"
# runs:
