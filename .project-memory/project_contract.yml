version: "0.1"
description: "Machine-readable contracts for the platform repository itself."

repository_identity:
  type: "universal agentic engineering platform"
  project_specific_domains_allowed: false
  old_project_coupling_allowed: false

protected_behaviors:
  - id: "repo.canonical-write.single-gate"
    text: "Agents must not write directly to the canonical repository. Only an explicit apply-patch step may change it."
    severity: "critical"
  - id: "agents.no-git-mutation"
    text: "Docker Agents must not commit, push, reset, restore, checkout, or stash unless a human explicitly approves a dedicated operation."
    severity: "critical"
  - id: "agents.no-secrets"
    text: "Agents must not receive production secrets, API keys, cloud credentials, or local private tokens."
    severity: "critical"
  - id: "patch.repo-relative-only"
    text: "Patch paths must be repository-relative and must reject absolute paths and traversal."
    severity: "critical"
  - id: "memory.neutral-labels"
    text: "Shared memory labels and anchors must stay project-neutral and reusable."
    severity: "high"
  - id: "context.no-whole-repo-default"
    text: "Agents must not scan the entire repository by default; they must start from the memory index and selected bundles."
    severity: "high"
  - id: "agents.context-snapshot.base-sha-guard"
    text: "Agent tasks must record base_sha from task prompt / PLAN.md and stop if current HEAD differs."
    severity: "high"
  - id: "agents.context-snapshot.index-version"
    text: "Agent tasks must record index_version from memory_index.yml for context audit history."
    severity: "high"
  - id: "agents.context-snapshot.stale-stop"
    text: "Agent tasks must verify base_sha against current HEAD before proceeding and stop on mismatch."
    severity: "critical"
  - id: "agents.final-output.decisions-made"
    text: "Agent final output must include a decisions-made section documenting deviations from PLAN.md."
    severity: "high"
  - id: "agents.final-output.deviations"
    text: "Agent final output must include a deviations-from-PLAN.md section with reason and impact."
    severity: "high"
  - id: "agents.final-output.context-used"
    text: "Agent final output must include CONTEXT USED with labels, memory files read, anchors, files inspected, files modified, and files intentionally ignored."
    severity: "medium"
  - id: "agents.git.read-only-introspection"
    text: "Agents may run git rev-parse --verify HEAD and git status --short for read-only introspection. All other git commands are forbidden unless explicitly approved."
    severity: "high"
  - id: "agents.context-snapshot.snapshot-verification-fields"
    text: "Review outputs must include snapshot_verified and snapshot_verified_by fields with machine-readable enum values (true/false/skipped, git introspection/not available/filesystem)."
    severity: "high"
  - id: "agents.run-record.required"
    text: "Controlled agents must produce structured run records with required fields defined in .project-memory/run-record.schema.yml."
    severity: "high"
  - id: "agents.run-record.path-pattern"
    text: "Run records must follow the canonical path pattern .project-memory/pr/<PR-ID>/run_record.yml."
    severity: "high"
  - id: "agents.run-record.per-pr-aggregate"
    text: "Run records must be per-PR aggregates with an ordered runs: list. Run order is authoritative and must be preserved."
    severity: "high"
  - id: "agents.run-record.run-id-required"
    text: "Each run item must have a unique run_id. Recommended format: <PR-ID>-<phase>-<agent>-<sequence>."
    severity: "high"
  - id: "agents.run-record.run-id-unique"
    text: "run_id must be unique within one PR run_record.yml."
    severity: "high"
  - id: "agents.run-record.base-sha-source"
    text: "Run records must include base_sha_source and index_version_source referencing the PLAN.md source."
    severity: "high"
  - id: "agents.run-record.snapshot-verification-fields"
    text: "Run records must include snapshot_verified and snapshot_verified_by fields from the schema enums."
    severity: "high"
  - id: "agents.run-record.author-type"
    text: "Each run item must include author_type (agent | human)."
    severity: "high"
  - id: "agents.run-record.repo-relative-posix-paths"
    text: "All file path fields in run records must be repo-relative POSIX paths."
    severity: "high"
  - id: "agents.run-record.sanitized-evidence"
    text: "Validation evidence in run records must be sanitized: no secrets, credentials, or tokens."
    severity: "critical"
  - id: "agents.run-record.bounded-evidence"
    text: "Validation evidence in run records must be bounded: maximum 2000 characters, no full logs or environment dumps."
    severity: "high"
  - id: "agents.run-record.no-secrets"
    text: "Run records must not contain secrets, API keys, cloud credentials, or local private tokens."
    severity: "critical"
  - id: "agents.run-record.evidence-not-authority"
    text: "Run records are evidence only. They do not grant patch application rights or authority to mutate the repository."
    severity: "high"
  - id: "agents.run-record.no-automatic-memory-writes"
    text: "Automatic memory writes via run records are forbidden unless explicitly approved in a separate reviewed plan."
    severity: "high"
  - id: "agents.run-record.no-backfill"
    text: "Backfilling run records for previous PRs is forbidden unless explicitly approved in a separate reviewed plan."
    severity: "high"
  - id: "agents.run-record.path-required"
    text: "Run records must specify run_record_path matching the pattern .project-memory/pr/<PR-ID>/run_record.yml."
    severity: "high"
  - id: "agents.run-record.runs-required"
    text: "Run records must include a non-empty runs[] list. runs[] is required and must contain at least one run item."
    severity: "high"
  - id: "agents.run-record.reference-resolution"
    text: "ApplyRequest references to run records must resolve: runs[] must contain exactly one item matching the referenced run_id."
    severity: "high"
  - id: "agents.run-record.invalid-reference-cases"
    text: "Ten invalid reference cases are defined in .project-memory/run-record.schema.yml. All must be checked."
    severity: "high"
  - id: "agents.run-record.validation-waiver-fields"
    text: "Validation waiver in run records requires human_waiver: true, waiver_reason, and waived_by."
    severity: "high"
  - id: "agents.run-record.evidence-bounded"
    text: "Validation evidence in run records must be bounded to 2000 characters maximum."
    severity: "high"
  - id: "agents.run-record.evidence-sanitized"
    text: "Validation evidence in run records must be sanitized: no secrets, credentials, or tokens."
    severity: "critical"
  - id: "agents.apply-gate.required"
    text: "Controlled agents must respect the Apply Gate contract defined in .project-memory/apply-gate.schema.yml. Canonical writes require a human-approved ApplyRequest."
    severity: "critical"
  - id: "agents.apply-gate.apply-request-schema"
    text: "ApplyRequests must conform to the schema in .project-memory/apply-gate.schema.yml with all required fields."
    severity: "high"
  - id: "agents.apply-gate.normalized-patch-reference"
    text: "ApplyRequests must reference the normalized patch via normalized_patch_id and normalized_patch_source."
    severity: "high"
  - id: "agents.apply-gate.run-record-reference"
    text: "ApplyRequests must reference the originating run_record via run_record_path and run_id."
    severity: "high"
  - id: "agents.apply-gate.base-sha-match"
    text: "ApplyRequests must require base_sha == current_head. Apply must stop if they differ."
    severity: "critical"
  - id: "agents.apply-gate.snapshot-verified"
    text: "ApplyRequests must require snapshot_verified == true. Apply must stop if verification is false or skipped without explicit human handling."
    severity: "critical"
  - id: "agents.apply-gate.human-approval-required"
    text: "ApplyRequests must include human approval. Apply must stop if human approval is missing."
    severity: "critical"
  - id: "agents.apply-gate.validation-required-or-waived"
    text: "ApplyRequests require validation to pass, or validation must be explicitly waived by a human with reason."
    severity: "high"
  - id: "agents.apply-gate.validation-waiver-human-only"
    text: "Validation waivers may only be granted by a human. Waiver must include approver, reason, timestamp, waived validation, and risk note."
    severity: "high"
  - id: "agents.apply-gate.no-forbidden-paths"
    text: "ApplyRequests must check forbidden_paths. Apply must stop if any forbidden path is present."
    severity: "critical"
  - id: "agents.apply-gate.no-secrets"
    text: "ApplyRequests must not contain secrets. Apply must stop if secrets are detected."
    severity: "critical"
  - id: "agents.apply-gate.allowed-paths-required"
    text: "ApplyRequests must include allowed_paths. Apply must stop if allowed_paths are absent."
    severity: "high"
  - id: "agents.apply-gate.forbidden-paths-required"
    text: "ApplyRequests must include forbidden_paths. Apply must stop if forbidden_paths are absent."
    severity: "high"
  - id: "agents.apply-gate.evidence-not-execution"
    text: "ApplyRequest is evidence and authorization request, not execution by itself. Apply approval does not imply git commit/push by agents."
    severity: "high"
  - id: "agents.apply-gate.no-agent-git-apply"
    text: "Agents must not run git apply. Git apply is a human/HITL action only."
    severity: "critical"
  - id: "agents.apply-gate.no-agent-canonical-write"
    text: "Agents must not directly mutate the canonical repository or apply patches to the canonical repository."
    severity: "critical"
  - id: "agents.apply-gate.no-docker-side-effects"
    text: "Agents must not perform Docker apply side effects."
    severity: "critical"
  - id: "agents.apply-gate.run-record-apply-outcome"
    text: "Apply outcomes must be recorded in the originating run_record under apply_outcome with all required fields."
    severity: "high"
  - id: "agents.review.validation-shell-access"
    text: >
      plan-review agent may execute read-only validation commands
      (pytest, compileall, runner doctor, grep) to self-verify
      implementation PRs without requiring author-supplied evidence.
      This does not grant write access, git mutation, or Docker access.
    severity: "medium"
  - id: "workspace-feature.record.required"
    text: "Workspace Feature Records are defined in .project-memory/workspace-feature-record.schema.yml as contract artifacts, not runtime implementations."
    severity: "high"
  - id: "workspace-feature.record.schema-path"
