validation_commands:
  python:
    - "python -m pytest -q"
    - "python -m compileall services packages"
  make:
    - "make test"
    - "make lint"

forbidden_generated_files:
  - ".DS_Store"
  - "__pycache__/"
  - ".pytest_cache/"
  - ".mypy_cache/"
  - ".ruff_cache/"
  - ".venv/"
  - "venv/"
  - "node_modules/"
  - "coverage.xml"
  - ".coverage"
  - "htmlcov/"
  - "*.db"
  - "*.sqlite"

human_approval_required_for:
  - "changing agent write permissions"
  - "allowing git mutation commands"
  - "running Docker with mounted docker.sock"
  - "adding model provider credentials"
  - "changing protected behavior contracts"
  - "broad repository restructuring"
  - "changing context-snapshot or final-output contract requirements"
