version: "0.22"
description: "Shared memory index for controlled Docker Agents. Agents read this first, then only the bundles matching task labels."

rules:
  first_file_to_read: ".project-memory/memory_index.yml"
  do_not_scan_entire_repo_by_default: true
  prefer_context_bundles: true
  use_current_task_if_present: ".project-memory/current_task.yml"
  fallback_task_source: "user message"
  max_default_context_files: 8
  stop_if_scope_unclear: true

labels:
  architecture:
    description: "System architecture, trust zones, boundaries, ADRs."
    bundles:
      - ".project-memory/context-bundles/architecture.yml"
    preferred_agent: "architect"

  context-steward-prompts:
    description: "Context Steward prompt template schema and reusable lifecycle hook prompt documentation."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/context-steward-prompt-template.schema.yml"
      - "docs/CONTEXT_STEWARD_PROMPTS.md"
    preferred_agent: "architect"

  context-steward:
    description: "Context Steward contract for context memory, PR workspace memory, and QA evidence stewardship."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/context-steward.schema.yml"
      - "schemas/feature-workspace-memory.schema.yml"
      - "schemas/qa-evidence-record.schema.yml"
      - "docs/CONTEXT_STEWARD.md"
      - "docs/adr/0009-context-steward-owns-context-memory.md"
    preferred_agent: "architect"

  cache-contracts:
    description: "Cache contracts for backend-agnostic deterministic keys, entries, and policies."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/cache-key.schema.yml"
      - "schemas/cache-entry.schema.yml"
      - "schemas/cache-policy.schema.yml"
      - "docs/CACHE_CONTRACTS.md"
      - "docs/adr/0008-cache-keys-are-substrate-contracts.md"
    preferred_agent: "architect"

  purpose:
    description: "Purpose (PCAM) schema and contract for agent task purpose decomposition."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/purpose.schema.yml"
    preferred_agent: "architect"

  pbs:
    description: "Purpose Breakdown Structure schema and contract for decomposing root purpose into agent-executable nodes."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/pbs.schema.yml"
    preferred_agent: "architect"

  state-model:
    description: "State Model schema and State-First contract extension for durable state entities and derived views."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/state-model.schema.yml"
    preferred_agent: "architect"

  transition-graph:
    description: "Transition Graph schema for named state transitions with preconditions, postconditions, and invariants."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/transition-graph.schema.yml"
    preferred_agent: "architect"

  rubric:
    description: "Rubric Pack and Rubric Judge Result schemas for runtime contract evaluation."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/rubric-pack.schema.yml"
      - "schemas/rubric-judge-result.schema.yml"
    preferred_agent: "architect"

  agent-runtime:
    description: "Agent Execution Contract schema defining what agents receive and must return."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "schemas/agent-execution-contract.schema.yml"
    preferred_agent: "architect"

  context-pack:
    description: "Context Pack schema and Semantic Context Decomposition contract for structured agent context."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/context-pack.schema.yml"
      - "docs/CONTEXT_COMPILER.md"
    preferred_agent: "architect"

  ariadne-anchors:
    description: "Ariadne Anchor schema and documentation for machine-readable semantic landmarks."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/ariadne-anchor.schema.yml"
      - "docs/ARIADNE_ANCHORS.md"
    preferred_agent: "architect"

  domain-adapter:
    description: "Domain Adapter Contract for separating Ariadne Core from domain-specific execution environments."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/domain-adapter.schema.yml"
      - "docs/DOMAIN_ADAPTER_CONTRACT.md"
      - "docs/adr/0004-ariadne-is-domain-agnostic.md"
    preferred_agent: "architect"
  sprint-0:
    description: "Repository skeleton, package layout, smoke tests, CI, Makefile."
    bundles:
      - ".project-memory/context-bundles/sprint-0.yml"
    preferred_agent: "coder"
  sprint-1:
    description: "Runner, sandbox snapshot, raw diff, patch normalization."
    bundles:
      - ".project-memory/context-bundles/sprint-1-runner.yml"
    preferred_agent: "coder"
  task-intake:
    description: "Text/voice/issue to task draft and preview."
    bundles:
      - ".project-memory/context-bundles/task-intake.yml"
    preferred_agent: "coder"
  contracts:
    description: "Safety invariants, scope manifest, project contracts, review gates."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    preferred_agent: "precommit-review"
    additional_files:
      - ".project-memory/run-record.schema.yml"
      - ".project-memory/apply-gate.schema.yml"
      - ".project-memory/workspace-feature-record.schema.yml"
      - "docs/adr/0001-ariadne-namespace.md"
      - ".project-memory/context-steward-archival.schema.yml"
      - ".project-memory/task-intake-request.schema.yml"
      - ".project-memory/task-intake-runner-handoff.schema.yml"
      - ".project-memory/model-routing.schema.yml"
      - "docs/adr/0002-model-selection-methodology.md"
      - ".project-memory/state-first.schema.yml"
      - "docs/adr/0003-state-first-agent-architecture.md"
      - ".project-memory/review-artifact.schema.yml"
  agent-config:
    description: "Docker Agent YAML configs and agent operating rules."
    bundles:
      - ".project-memory/context-bundles/agent-config.yml"
    preferred_agent: "architect"
  run-record:
    description: "Feature Workspace Run Record schema and contract for agent output evidence."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/run-record.schema.yml"
    preferred_agent: "precommit-review"
  apply-gate:
    description: "Apply Gate / Canonical Write Contract for human/HITL-approved repository writes."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/apply-gate.schema.yml"
    preferred_agent: "precommit-review"
  workspace-feature:
    description: "Workspace Feature Record contract for durable feature/workspace state, run record links, and Context Steward archival."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/workspace-feature-record.schema.yml"
    preferred_agent: "precommit-review"
  ariadne-namespace:
    description: ".ariadne/ namespace ADR and contract for repository-local runtime/workspace state, feature record future storage, and Context Steward archival sequencing."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - "docs/adr/0001-ariadne-namespace.md"
      - ".project-memory/workspace-feature-record.schema.yml"
      - ".project-memory/context-steward-archival.schema.yml"
    preferred_agent: "architect"

  context-steward:
    description: "Context Steward archival workflow contract for after-merge feature record archival."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/context-steward-archival.schema.yml"
      - ".project-memory/workspace-feature-record.schema.yml"
    preferred_agent: "architect"

  task-intake:
    description: "Task Intake API Request contract for accepted/rejected intake, task_id, validation boundaries, and future runner handoff."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/task-intake-request.schema.yml"
    preferred_agent: "coder"
      
  task-intake-runner-handoff:
    description: "Task Intake → Runner Handoff contract for handoff eligibility, task_id linkage, runner boundary, run_record boundary, and workspace boundary."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/task-intake-runner-handoff.schema.yml"
    preferred_agent: "architect"

  model-routing:
    description: "Model selection methodology, routing contracts, and ContextStressProfile schema."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/model-routing.schema.yml"
      - "docs/adr/0002-model-selection-methodology.md"
    preferred_agent: "architect"

  state-first:
    description: "State-First Agent Architecture contracts, transition graph schema, invariant registry, and state trace schema."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/state-first.schema.yml"
      - "docs/adr/0003-state-first-agent-architecture.md"
    preferred_agent: "architect"

  conductor-prompt:
    description: "Conductor Prompt Contract and Prompt Artifact schema for reproducible model-agnostic prompt generation."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/conductor-prompt-contract.schema.yml"
      - ".project-memory/prompt-artifact.schema.yml"
      - "docs/CONDUCTOR_PROMPT_CONTRACT.md"
      - ".project-memory/domain-adapter.schema.yml"
      - "docs/DOMAIN_ADAPTER_CONTRACT.md"
      - "docs/adr/0004-ariadne-is-domain-agnostic.md"
    preferred_agent: "architect"

  review-artifacts:
    description: "Durable review artifact contract for plan-review and precommit-review evidence."
    bundles:
      - ".project-memory/context-bundles/contracts.yml"
    additional_files:
      - ".project-memory/review-artifact.schema.yml"
      - ".project-memory/review-artifact-workflow.yml"
      - ".project-memory/conductor-prompt-contract.schema.yml"
      - ".project-memory/prompt-artifact.schema.yml"
      - "docs/CONDUCTOR_PROMPT_CONTRACT.md"
    preferred_agent: "plan-review"

agent_memory_profiles:
  architect:
    always_read:
      - ".project-memory/project_contract.yml"
      - ".project-memory/anchors.yml"
    default_labels: ["architecture", "contracts", "agent-config"]
    max_files_before_review: 10
  coder:
    always_read:
      - ".project-memory/project_contract.yml"
    default_labels: ["sprint-0"]
    max_files_before_edit: 8
  plan-review:
    always_read:
      - ".project-memory/project_contract.yml"
    default_labels: ["contracts", "architecture"]
    max_files_before_verdict: 8
  precommit-review:
    always_read:
      - ".project-memory/project_contract.yml"
      - ".project-memory/anchors.yml"
    default_labels: ["contracts", "agent-config"]
    max_files_before_verdict: 12

forbidden_legacy_terms:
  - "water_meter"
  - "water-meter"
  - "Water Meter"
  - "broken_clock"
  - "broken-clock"
  - "Broken Clock"
  - "daily-consumption"
  - "daily consumption"
  - "Flask articles-api"
  - "Practical_Repo"
  - "DynamoDB Scan"
  - "Warm Sand"
  - "@grace-"
  - ".grace"

context_refresh_policy:
  update_memory_index_when:
    - "new service/package is added"
    - "new sprint starts"
    - "new architectural invariant is accepted"
    - "agent config permissions change"
  do_not_update_memory_for:
    - "ordinary smoke test fixes"
    - "formatting-only changes"
    - "generated files"
