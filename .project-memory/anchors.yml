version: "0.1"
description: "Stable anchors for quick context retrieval. Keep anchors generic and project-neutral."

anchors:
  repo.structure.root:
    type: "architecture"
    labels: ["architecture", "sprint-0"]
    description: "Top-level repository skeleton and ownership boundaries."
    paths:
      - "README.md"
      - "docs/REPOSITORY_STRUCTURE.md"
      - "docs/START_HERE.md"

  agents.controlled-docker-agents:
    type: "agent-config"
    labels: ["agent-config", "contracts"]
    description: "Four separate manually-controlled Docker Agents. No automatic swarm orchestration."
    paths:
      - "agents/architect.yml"
      - "agents/coder.yml"
      - "agents/plan-review.yml"
      - "agents/precommit-review.yml"
    invariants:
      - "agents.no-git-mutation"
      - "context.no-whole-repo-default"

  memory.shared-index:
    type: "memory"
    labels: ["contracts", "agent-config"]
    description: "Shared memory entrypoint for all agents. Agents read this before selecting context bundles."
    paths:
      - ".project-memory/memory_index.yml"
      - ".project-memory/context-bundles/"

  runner.patch-safety:
    type: "architecture"
    labels: ["sprint-1", "contracts"]
    description: "Runner and patch pipeline safety boundary."
    paths:
      - "services/runner/"
      - "packages/contracts/"
      - "packages/policy/"
      - "docs/sprints/SPRINT_1_RUNNER_PATCH_PIPELINE.md"
    invariants:
      - "repo.canonical-write.single-gate"
      - "patch.repo-relative-only"

  task-intake.normalization:
    type: "feature-area"
    labels: ["task-intake"]
    description: "Input normalization layer: text/voice/issue to task draft and preview."
    paths:
      - "services/task_intake/"
      - "docs/api/TASK_INTAKE_API.md"

  agents.review.validation-shell-access:
    type: "agent-permission"
    labels: ["agent-config", "contracts"]
    description: >
      plan-review agent has read-only validation shell access.
      Does not grant write_file, edit_file, git mutation, or Docker.
    contract_ids:
      - "agents.review.validation-shell-access"

  workspace-feature.record.required:
    type: "contract"
    labels: ["contracts", "workspace-feature"]
    description: "Workspace Feature Record schema is defined in .project-memory/workspace-feature-record.schema.yml."
    contract_ids:
      - "workspace-feature.record.required"

  workspace-feature.record.schema-path:
    type: "contract"
    labels: ["contracts", "workspace-feature"]
    description: "Schema path: .project-memory/workspace-feature-record.schema.yml"
    contract_ids:
      - "workspace-feature.record.schema-path"

  workspace-feature.record.run-id-to-feature-workspace-id:
    type: "contract"
    labels: ["contracts", "workspace-feature", "run-record"]
    description: "run_id -> feature_workspace_id relationship must be explicit in run_record_links."
    contract_ids:
      - "workspace-feature.record.run-id-to-feature-workspace-id"

  workspace-feature.record.context-steward-archival-required:
    type: "contract"
    labels: ["contracts", "workspace-feature"]
    description: "Context Steward archival after merge is required. A merged feature must not silently disappear into chat history."
    contract_ids:
      - "workspace-feature.record.context-steward-archival-required"

  workspace-feature.record.no-ariadne-storage-yet:
    type: "contract"
    labels: ["contracts", "workspace-feature"]
    description: "PR 0024 does not introduce .ariadne/** namespace. Actual feature instances are future work."
    contract_ids:
      - "workspace-feature.record.no-ariadne-storage-yet"

  workspace-feature.record.artifact-references-evidence-only:
    type: "contract"
    labels: ["contracts", "workspace-feature", "artifacts"]
    description: "Artifact sha256 references in Workspace Feature Records are evidence only and do not authorize canonical mutation."
    contract_ids:
      - "workspace-feature.record.artifact-references-evidence-only"

  ariadne.namespace.required:
    type: "adr-contract"
    labels: ["contracts", "ariadne-namespace"]
    description: ".ariadne/ namespace defined in docs/adr/0001-ariadne-namespace.md. .ariadne/ is runtime/workspace state; .project-memory/ is durable contracts/history/project memory."
    contract_ids:
      - "ariadne.namespace.required"

  ariadne.namespace.adr-path:
    type: "adr-contract"
    labels: ["contracts", "ariadne-namespace"]
    description: "ADR: docs/adr/0001-ariadne-namespace.md"
    contract_ids:
      - "ariadne.namespace.adr-path"

  ariadne.namespace.features-storage-path:
    type: "adr-contract"
    labels: ["contracts", "ariadne-namespace", "workspace-feature"]
    description: "Future Workspace Feature Record physical storage path: .ariadne/features/{id}.yml"
    contract_ids:
      - "ariadne.namespace.features-storage-path"

  ariadne.namespace.no-feature-instances-this-pr:
    type: "adr-contract"
    labels: ["contracts", "ariadne-namespace"]
    description: "PR 0025 defines the .ariadne/ namespace only and does not create actual feature record instances."
    contract_ids:
      - "ariadne.namespace.no-feature-instances-this-pr"

  ariadne.namespace.context-steward-writer-future-contract:
    type: "adr-contract"
    labels: ["contracts", "ariadne-namespace", "workspace-feature"]
    description: "Context Steward archival writer for .ariadne/features/{id}.yml requires separate future workflow contract (PR 0026)."
    contract_ids:
      - "ariadne.namespace.context-steward-writer-future-contract"

  ariadne.namespace.no-agent-writes-without-contract:
    type: "adr-contract"
    labels: ["contracts", "ariadne-namespace"]
    description: "No agents may write .ariadne/** without an explicit future contract permitting it."
    contract_ids:
      - "ariadne.namespace.no-agent-writes-without-contract"

  context-steward.archival.required:
    type: "contract"
    labels: ["contracts", "context-steward"]
    description: "Context Steward archival workflow schema is defined in .project-memory/context-steward-archival.schema.yml."
    contract_ids:
      - "context-steward.archival.required"

  context-steward.archival.schema-path:
    type: "contract"
    labels: ["contracts", "context-steward"]
    description: "Schema path: .project-memory/context-steward-archival.schema.yml"
    contract_ids:
      - "context-steward.archival.schema-path"

  context-steward.archival.after-merge-only:
    type: "contract"
    labels: ["contracts", "context-steward"]
    description: "Archival starts only after merge. Must not run for unmerged PRs or chat-only state."
    contract_ids:
      - "context-steward.archival.after-merge-only"

  context-steward.archival.destination-path:
    type: "contract"
    labels: ["contracts", "context-steward", "ariadne-namespace", "workspace-feature"]
    description: "Destination path template: .ariadne/features/{feature_workspace_id}.yml"
    contract_ids:
      - "context-steward.archival.destination-path"

  context-steward.archival.requires-run-record-links:
    type: "contract"
    labels: ["contracts", "context-steward", "run-record"]
    description: "run_record_links must include run_id and feature_workspace_id before archival."
    contract_ids:
      - "context-steward.archival.requires-run-record-links"

  context-steward.archival.no-evidence-invention:
    type: "contract"
    labels: ["contracts", "context-steward"]
    description: "Context Steward must not invent missing validation evidence, review evidence, or decisions."
    contract_ids:
      - "context-steward.archival.no-evidence-invention"

  context-steward.archival.no-actual-records-this-pr:
    type: "contract"
    labels: ["contracts", "context-steward"]
    description: "PR 0026 defines the archival workflow contract only. No actual .ariadne/** files are created."
    contract_ids:
      - "context-steward.archival.no-actual-records-this-pr"

  task-intake.request.required:
    type: "contract"
    labels: ["contracts", "task-intake"]
    description: "Task Intake Request contract defined in .project-memory/task-intake-request.schema.yml."
    contract_ids:
      - "task-intake.request.required"

  task-intake.request.schema-path:
    type: "contract"
    labels: ["contracts", "task-intake"]
    description: "Schema path: .project-memory/task-intake-request.schema.yml"
    contract_ids:
      - "task-intake.request.schema-path"

  task-intake.request.task-id-required-on-acceptance:
    type: "contract"
    labels: ["contracts", "task-intake"]
    description: "Accepted response must include a task_id. Format: task_<bounded-id>."
    contract_ids:
      - "task-intake.request.task-id-required-on-acceptance"

  task-intake.request.no-runner-invocation:
    type: "contract"
    labels: ["contracts", "task-intake"]
    description: "Task Intake must not invoke the runner. Accepted intake does not mean execution."
    contract_ids:
      - "task-intake.request.no-runner-invocation"

  task-intake.request.no-run-record-creation:
    type: "contract"
    labels: ["contracts", "task-intake", "run-record"]
    description: "Task Intake must not create run_record.yml files."
    contract_ids:
      - "task-intake.request.no-run-record-creation"

  task-intake.request.no-ariadne-writes:
    type: "contract"
    labels: ["contracts", "task-intake", "ariadne-namespace"]
    description: "Task Intake must not write .ariadne/**."
    contract_ids:
      - "task-intake.request.no-ariadne-writes"

  task-intake.request.runner-handoff-future-contract:
    type: "contract"
    labels: ["contracts", "task-intake"]
    description: "Runner handoff requires a future Task Intake → Runner Handoff Contract. PR 0028 does not define it."
    contract_ids:
      - "task-intake.request.runner-handoff-future-contract"
