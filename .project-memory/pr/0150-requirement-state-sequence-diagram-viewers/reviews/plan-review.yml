  - id: "W002"
    description: "The render script extension .cjs requires dynamic import('mermaid') because mermaid v11 is ESM-only. A .mjs script could use direct import. The PLAN.md specifies .cjs but does not document that CJS require() of mermaid returns {default: ...} rather than the top-level render/initialize functions."
    evidence: "Physical test: require('mermaid') returns {__esModule: true, default: {render, initialize, ...}}. Access via mermaid.default.render() or use dynamic import('mermaid') which returns the module directly. Node.js v25 handles both approaches."
    recommendation: "Update PLAN.md to document that the .cjs script must use await import('mermaid') or mermaid.default.render(), not mermaid.render(). This is a minor implementation detail the coder must know."
