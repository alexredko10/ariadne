    description: "PLAN.md Validation grep pattern omits 'shell=True' and 'os.system', which are required forbidden command tokens from the user prompt mandatory check. The broader codebase grep (which is not PLAN-specific) correctly includes them but the PLAN validation section does not."
    evidence: "PLAN.md Validation grep: 'git add|git commit|git push|gh pr create|git checkout|git switch|git merge|git rebase|git reset|git clean|git tag|docker compose|docker run|pip install|python -m pip install'. Missing: 'shell=True', 'os.system', bare 'docker', 'gh release'. The existing source already contains 'os.system' (verdict_parser.py:136) and 'shell=True' does not appear in any runner source."
    recommendation: "Extend PLAN validation grep to: 'git add|git commit|git push|git checkout|git switch|git merge|git rebase|git reset|git clean|git tag|gh pr create|gh release|docker|docker compose|docker run|pip install|python -m pip install|shell=True|os.system'. Note that shell=True/os.system may not appear in the changed files (agent_runner_bridge.py has neither); grep exit code 1 is expected."
decisions_made:
  - decision: "Approve plan for PR 0131D with three non-blocking warnings"
    reason: "PLAN correctly identifies both blocker sources with exact line evidence (not guesses): missing_agent_config at agent_runner_bridge.py:199 via resolve_agent_config ValueError when agents/planner.yml absent; docker_blocked at agent_runner_bridge.py:237-239 via harness→dispatcher→docker_adapter→blocked chain. Plan chooses Option A (add agents/planner.yml) and defines a local non-Docker execution branch that is safe, bounded, and preserves proof capture + hash evidence. Docker remains opt-in (allow_docker=True required). Git Boundary untouched. Scope minimal: one new config file + bridge code + 2 test files."
  - decision: "Option A (add agents/planner.yml) is the correct minimal fix"
    reason: "agents/planner.yml is absent from existing agent configs (verified via find agents -maxdepth 2 -type f: architect.yml, chief-architect.yml, coder.yml, plan-review.yml, precommit-review.yml exist; planner.yml absent). Option B (alias/mapping) requires code changes to bridge. Option C (change Prompt Composer) would change prompt semantics and agent name throughout. Option A adds one minimal config file with no code changes to bridge or composer. Rationale explicitly rejects architect.yml reuse as semantically wrong."
  - decision: "Local non-Docker branch design is safe and bounded"
    reason: "Local branch: (a) skips harness/dispatcher/adapter entirely when allow_docker=False; (b) does not import subprocess; (c) does not call git/gh; (d) does not run Docker; (e) does not install dependencies; (f) does not run network; (g) proof capture still fires (bridge_status != FAILED path); (h) task_prompt_hash and agent_config_hash preserved; (i) reason codes still built from local branch. PLAN explicitly enumerates all safety guarantees."
  - decision: "Docker boundary preserved"
    reason: "allow_docker remains False by default (pipeline_runner.py:59 sets allow_docker=False). Docker adapter requires allow_docker=True at docker_agent_adapter.py:123 + ARIADNE_ALLOW_DOCKER_EXECUTION env. Local branch only fires when allow_docker=False. Docker path (allow_docker=True) unchanged. Plan explicitly blocks 'simply sets allow_docker=True'."
  - decision: "Git mutation boundary preserved"
    reason: "Git Boundary untouched. agent_runner_bridge.py TestNoGitMutation already verifies bridge code contains no git add/commit/push/etc. After 0131C fix, bridge only checks _FORBIDDEN_HIDDEN_REASONING_PATTERNS.PLAN explicitly enumerates git/gh mutation as forbidden."
