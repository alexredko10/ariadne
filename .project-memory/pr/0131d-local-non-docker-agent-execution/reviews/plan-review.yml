  - id: "test-artifact-path-assertion-dot-prefix"
    description: "test_pipeline_runner.py TestLocalNonDockerPipeline and test_pipeline_runner.py TestLocalNonDockerPipeline may assert expected_path in result.artifact_hashes using a bare path like '.project-memory/pr/dogfood/dogfood-proof.yml'. When repo_root='.' (default), pipeline_runner._check_artifact uses os.path.join(request.repo_root, expected_path) = os.path.join('.', path) which yields './.project-memory/pr/dogfood/dogfood-proof.yml'. The bare path assertion may fail."
    evidence: "pipeline_runner.py:_check_artifact uses full_path = os.path.join(request.repo_root, expected_path). _default_packets() in test_pipeline_runner.py uses '.project-memory/pr/0127/PLAN.md' (no leading './'). Existing test_coder_creates_dogfood_proof_in_temp_path was flagged in 0131C plan-review as having this exact issue."
    recommendation: "Use any(key.endswith(expected_path) for key in result.artifact_hashes) or assert './' + expected_path in result.artifact_hashes OR compute expected_key = os.path.join('.', expected_path) and assert that."
