  PLAN.md correctly inventories the software-first run model: branch, base_branch,
  git_boundary_status, pr_url, gh_pr_create, command_plan_summary, execution_results,
  pipeline_step_summary. All confirmed in run_persistence.py RunPersistenceRequest
  (L43-72) and runtime_evidence.py _extract_pr_url. These fields are Git/GitHub-biased.
run_persistence_inventory_assessment: >
  PLAN.md correctly describes the run directory layout: <runs_root>/<run_id>/run.json,
  manifest.json, run-report.txt. Confirmed in run_persistence.py: persist_run_record()
  writes run.json (L220-270) and manifest.json. No run-profile.json currently exists.
manifest_artifact_store_inventory_assessment: >
  Manifest contains schema_version, run_id, run_json_hash, files array. Confirmed in
  run_persistence.py L273-278. ArtifactStore provides put_text/put_bytes/read_record/
  read_bytes with sha256 addressing. Kind labels include GENERIC_TEXT, GENERIC_JSON.
  Confirmed in artifacts.py.
runtime_evidence_inventory_assessment: >
  Runtime evidence model provides RunEvidenceSummary (run_id, status, reason_codes,
  pipeline_status, git_boundary_status, execution_attempted, pr_url, etc.) and
  RunEvidenceDetail (execution_results, manifest_files, run_json_hash, etc.).
  Confirmed in runtime_evidence.py. These are software-first structures.
serialization_inventory_assessment: >
  Serialization contract at runtime_evidence_serialization.py provides
  serialize_run_evidence_summary(), serialize_run_evidence_detail(),
  serialize_run_index() with ev_contract_version '1'. GET /runs and GET /runs/<run_id>
  use versioned responses. Confirmed in the source file and test_local_run_history_in_page.py.
local_operator_workspace_inventory_assessment: >
  Local operator (local_operator.py) is server-owned read-only with runs-root security.
  Workspace (artifact_workspace.py) has four zones: Timeline, Canvas, Gates & Proofs,
  Logs & Captures. All confirmed in docs/LOCAL_OPERATOR.md and the source files.
pr0147b_compatibility_assessment: >
  PR 0147B manual orchestration sessions are completely separate (.ariadne/orchestration/).
  The profile sidecar is in the runs directory (.ariadne/runs/<run_id>/run-profile.json).
  PR 0147B's GET /orchestration/<session_id> and PR 0147C's GET /runs/<run_id>/profile
  are additive routes with no overlap. PR 0147B's precommit-review.yml confirms PR 0147C
  deferred. Manual orchestration files (manual_orchestration.py, manual_orchestration_cli.py)
  are listed as not modified in PR 0147C's implementation scope.
storage_option_assessment: >
  PLAN.md explicitly selects OPTION A (Run-Directory Profile Sidecar) with complete
  rationale. Not open to both options. Key reasons: isolation from run.json, no
  run.json schema/hashing change, no RunPersistenceRequest modification, profile is
  optional presentation metadata separate from evidence.
canonical_profile_storage_assessment: >
  One canonical profile source: <runs_root>/<run_id>/run-profile.json alongside
  run.json and manifest.json. No duplicate mutable profile truth. Profile is discovered
  through manifest.json's files array when present. Atomic write uses .tmp file +
  os.replace. Relationship to run_id is explicit (run_id field in profile, matching
  the run directory name).
profile_identity_version_assessment: >
  Profile identity: schema_version '1' (must be exactly "1", max 10 chars), profile_key
  matching ^[a-z][a-z0-9\-]{1,63}$. Unsupported versions return "unsupported profile
  version". Unknown profile_key is allowed (generic rendering treats all keys identically).
  run_id must match an existing run_id format (reuses _RUN_ID_RE).
profile_hash_integrity_assessment: >
  Profile hash (profile_sha256) computed as sha256 of canonical JSON (excluding the
  profile_sha256 field itself). Canonical JSON uses json.dumps(sort_keys=True,
  ensure_ascii=False). Hash mismatch is detectable on read by recomputing and comparing.
  Hash mismatch is reported in the response (hash_match: false with error "profile hash
  mismatch"). Malformed JSON and unsupported version are separately handled.
run_presentation_assessment: >
  Run presentation object contains title (optional, max 200 chars, no HTML), status_label
  (optional, max 100 chars, no HTML), and neutral_facts (optional array, max 50 items).
  Run_id remains canonical from run.json. Status remains canonical from run.json.
  Blockers remain visible through existing runtime evidence. Profile metadata is labelled
  descriptive and non-proof. No fabricated completion or verification.
neutral_fact_assessment: >
  Fact contract is complete: key (^[a-z][a-z0-9_]{1,63}$, max 64), label (max 200, plain
  text), value (max 1000 chars serialized), value_type (text, number, date, boolean, enum,
  currency), unit (optional, max 50, number only), currency (optional, ISO 4217, 3 chars,
  currency type only), display_order (>=0 integer), source (optional, max 50, one of
  "operator", "adapter", "system"). Number handling: finite (not NaN, not Infinity).
  Date handling: ISO 8601 (YYYY-MM-DD). Boolean: true/false. Enum: ^[a-z][a-z0-9_]{1,63}$.
  Duplicate fact keys rejected at creation. Unsupported value types rejected. No
  arbitrary nested executable values.
artifact_group_assessment: >
  Group contract: key (^[a-z][a-z0-9_\-]{1,63}$, max 64), label (max 200, plain text),
  display_order (>=0 integer). Max 20 keys. Duplicate group keys rejected at creation.
  Default-group behavior: descriptors reference groups by group_key. Descriptors without
  a matching group_key would be invalid. Inert labels only — no templates or CSS.
artifact_descriptor_assessment: >
  Descriptor contract: key (^[a-z][a-z0-9_\-]{1,63}$, max 64), label (max 200, plain text),
  kind (free-form, max 50, e.g. "summary", "spreadsheet", "report"), evidence_role (one
  of: input, output, report, capture, supporting), media_type (MIME type, max 100), ref
  (per controlled reference contract, max 500), sha256 (optional, lowercase hex 64 chars),
  group_key (must reference artifact_groups key), display_order (>=0 integer), required
  (boolean). Max 100 items. Duplicate keys rejected. Conflicting refs (same ref, different
  sha256) rejected. Required missing artifacts highlighted. Optional unavailable shown.
  No acceptance lifecycle state.
controlled_reference_assessment: >
  Approved reference forms: run-relative: and sha256:. run-relative: resolved to
  <runs_root>/<run_id>/<path> with directory traversal rejection via os.path.realpath().
  sha256: resolved through ArtifactStore at controlled store root. Rejected: absolute
  paths (/etc/passwd), traversal paths (../../.git/config), URLs (https://example.com),
  file: URLs, javascript: URLs, data: URLs. Browser input cannot select roots or paths.
  No general filesystem browser.
construction_persistence_api_assessment: >
  create_run_profile() in services/runner/src/runner/run_profile.py accepts typed inputs
  (presentation, artifact_groups, artifact_descriptors). Validation reuse of _RUN_ID_RE.
  Runs root and run directory existence checked. Canonical JSON built, sha256 computed.
  Atomic write to run-profile.json. Readback verify. No arbitrary destination path.
  No domain adapter. No external dependency. Pure library function — no CLI, no HTTP,
  no agent call.
read_model_assessment: >
  read_run_profile() returns dict with ok, error, details, profile, profile_sha256,
  profile_exists, hash_match. Supports: ready state (ok=true, hash_match=true), missing
  state (profile_exists=false), malformed state (JSON parse failure), unsupported version
  (schema_version != "1"), hash-mismatch state (ok=true, hash_match=false). All states
  are explicit and handled.
get_api_assessment: >
  GET /runs/<run_id>/profile route with versioned JSON response (ev_contract_version '1').
  All response states documented: available (ok=true, hash_match=true), hash mismatch
  (ok=true, hash_match=false, error message), not found (ok=false, "profile not found"),
  malformed (ok=false, "profile malformed"), validation failure (ok=false, "profile
  validation failed"), unsupported version (ok=false, "unsupported profile version").
  Route placed before existing detail handler. run_id validation reuses _RUN_ID_RE.
  runs_root is server-owned. No HTTP mutation. No arbitrary query root.
generic_workspace_assessment: >
  One generic renderer handles any valid profile. No construction-specific, software-specific,
  or Mermaid-specific conditional logic. Profile key and version displayed. Neutral facts
  displayed as label-value table. Artifact groups displayed as expandable sections with
  descriptors. Required missing artifacts highlighted. Optional unavailable shown.
  Runtime evidence remains primary. Profile metadata labelled "not runtime proof." No
  profile-selection or file-upload controls. No mutation controls.
safe_rendering_assessment: >
  All profile values rendered via safeText (textContent). Labels plain text only. Paths
  in refs rendered as inert text (not clickable). URLs in profile rendered as inert text
  (not linkified). sha256 values rendered as inert text. HTML, script, Markdown — all
  inert. No automatic links. No Markdown execution. No Mermaid execution. No HTML
  execution. No external embeds. No mutation controls. Same pattern as PR 0145/0146/0147.
legacy_compatibility_assessment: >
  Existing evidence contracts (ev_contract_version '1') remain fully compatible. GET /runs
  and GET /runs/<run_id> are unchanged. Missing run-profile.json is expected for legacy
  runs — returns ok=false, "profile not found". Existing artifacts.py (ArtifactStore) and
  run_persistence.py are unchanged. No existing evidence semantics weakened.
