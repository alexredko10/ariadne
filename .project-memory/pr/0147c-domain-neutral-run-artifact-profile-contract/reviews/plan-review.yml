summary: >
  PR 0147C PLAN.md defines a complete, executable, safe, and backward-compatible
  implementation contract for a domain-neutral run and artifact profile. OPTION A
  (Run-Directory Profile Sidecar) is selected with clear rationale. The profile
  contract is fully versioned (schema_version '1') with exact field types, bounds,
  and validation. Profile hashing is deterministic (sha256 of canonical JSON
  excluding the self-referential profile_sha256 field). Six approved value types
  (text, number, date, boolean, enum, currency) with bounded display. Artifact
  groups (up to 20) and artifact descriptors (up to 100) with exact contracts.
  Controlled references are strictly contained (run-relative: and sha256: only)
  with absolute paths, traversal, and URLs explicitly rejected. The GET-only
  /runs/<run_id>/profile route is additive to the version-1 evidence contract.
  The generic workspace renderer handles any valid profile without domain-specific
  logic. PR 0147D (Construction Estimate Dogfood Adapter) and PR 0148 (Mermaid)
  are explicitly deferred. The roadmap alignment section is present and complete.
  Two minor warnings: the self-referential hash pattern requires careful
  implementation, and the plan-review artifact is being written by this review.
recommendations:
  - "During implementation, ensure the profile_sha256 exclusion from canonical JSON follows the same pattern as PR 0147B's session_state_hash exclusion."
  - "Ensure create_run_profile() validates that the run directory exists and contains run.json before writing run-profile.json."
  - "Add an explicit test for URL rejection (https://, file://, javascript:, data:) in controlled reference validation."
  - "Ensure the generic workspace renderer does not accidentally render sha256 values as links."
