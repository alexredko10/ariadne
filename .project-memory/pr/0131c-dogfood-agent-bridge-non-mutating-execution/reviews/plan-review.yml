warnings:
  - id: "roadmap-alignment-section-missing"
    description: "PLAN.md lacks the explicit 'Roadmap alignment' section required by ROADMAP.md for every PR from PR 0094 onward. Required subsection format (roadmap track, expected PR slot, why this PR is next, batching policy check, drift heuristic check, architect sign-off required) absent. PR 0131C continues Production Line Stage 2 Closed Loop / PR 0131 DOGFOOD MILESTONE stream (parent PRs 0131A and 0131B both passed precommit); context is implicit but not stated in this PLAN."
    evidence: "PLAN.md headings present: Root Cause, Files, Changes, Fix, Non-Mutating Artifact-Write Contract, Git Mutation Boundary, Dogfood Validation, Non-Goals, Validation. No 'Roadmap alignment' heading. ROADMAP.md mandates this section from PR 0094 onward."
    recommendation: "Add an explicit 'Roadmap alignment' section to PLAN.md stating: roadmap track = Production Line Stage 2 Closed Loop; expected PR slot = 0131C (continuation of 0131A/0131B minimal-corrections cluster); why this PR is next = removes agent_runner_bridge false-positive scanner blocking dogfood milestone end-to-end; batching policy check = single-executable-fix with bridge-test additions; drift heuristic check = does not apply (backend runner fix); architect sign-off required = no (continuation of approved PRs in active stream)."
  - id: "test-assertion-artifact-hashes-key-mismatch"
    description: "Proposed test test_coder_creates_dogfood_proof_in_temp_path asserts '.project-memory/pr/dogfood/dogfood-proof.yml' in result.artifact_hashes. In pipeline_runner.py:_check_artifact, the dict key is built as os.path.join(request.repo_root, expected_path) which yields './.project-memory/pr/dogfood/dogfood-proof.yml' when repo_root='.'. The literal substring assertion would fail."
    evidence: "PLAN.md lines 286-298: test_coder_creates_dogfood_proof_in_temp_path asserts expected_path in result.artifact_hashes. pipeline_runner.py:_check_artifact uses full_path = os.path.join(request.repo_root, expected_path). test_pipeline_runner.py:_default_packets uses '.project-memory/pr/0127/PLAN.md' (no leading './'). With repo_root='.', actual key is './.project-memory/pr/0127/PLAN.md'."
    recommendation: "In implementation: (a) assert expected_path in result.artifact_hashes OR './' + expected_path in result.artifact_hashes, (b) compute expected_key = os.path.join('.', expected_path) and assert that, or (c) use any(key.endswith(expected_path) for key in result.artifact_hashes)."
  - id: "forbidden-command-grep-pattern-incomplete"
    description: "PLAN.md Validation grep pattern omits 'gh release' and the bare token 'docker' (without 'compose' or 'run' suffix). User prompt mandatory check 8 requires these tokens in forbidden agent commands."
    evidence: "PLAN.md Validation grep: 'git add|git commit|git push|gh pr create|git checkout|git switch|git merge|git rebase|git reset|git clean|git tag|docker compose|docker run|pip install|python -m pip install'. Missing: 'gh release', bare 'docker'."
    recommendation: "In implementation, extend the grep pattern to: 'git add|git commit|git push|git checkout|git switch|git merge|git rebase|git reset|git clean|git tag|gh pr create|gh release|docker|docker compose|docker run|pip install|python -m pip install'. Existing source already contains 'docker' (prompt_composer._FORBIDDEN_COMMANDS line 144) and 'gh release' (agent_runner_bridge._FORBIDDEN_MUTATION_PATTERNS line 142) so the broader grep will produce legitimate matches proving the patterns are pre-existing."
  - id: "forbidden-pattern-defense-in-depth-reduction"
    description: "PLAN removes both _FORBIDDEN_ACTION_PATTERNS scan AND _FORBIDDEN_MUTATION_PATTERNS scan from agent_runner_bridge.py. After the fix, the bridge will only scan for _FORBIDDEN_HIDDEN_REASONING_PATTERNS (<cot>, <chain_of_thought>, 'hidden_reasoning'). This means the bridge will not detect prompt text containing actual execution instructions like 'pip install foo', 'subprocess.run(...)', 'import openai'. PLAN's structural-safety argument is valid (no real git/gh tools in agent environment per docker_agent_adapter.py:123 allow_docker guard + local_harness.py module docstring 'No real execution, no Docker daemon, no process spawning, no network calls, no filesystem IO'), but this represents a deliberate reduction in text-level defense in depth."
    evidence: "PLAN.md Changes section removes both: (1) import of _FORBIDDEN_ACTION_PATTERNS from improvement_backlog, (2) local _FORBIDDEN_MUTATION_PATTERNS tuple (12 entries). Structural safety verified: docker_agent_adapter.py requires allow_docker=True at line 123; local_harness.py declares bounded deterministic runtime slice with no real execution; PLAN.md 'Non-Mutating Artifact-Write Contract' explicitly enumerates three structural guards."
    recommendation: "Acceptable as designed. Structural guards are stronger than text scanning because (a) agent_runner_bridge returns 'blocked' when allow_docker=False (default), (b) no shell-execution toolchain is provided to the agent, (c) Git Boundary is sole authority for git mutation. Any future PR that adds a new toolchain surface should re-introduce text-level scanning at the bridge as defense in depth."
