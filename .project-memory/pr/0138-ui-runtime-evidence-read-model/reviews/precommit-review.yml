summary: |
  PR 0138 precommit review PASSES.

  Implementation creates a narrow read-only runtime evidence read model in
  services/runner/src/runner/runtime_evidence.py with 5 frozen dataclasses
  (RunEvidenceSummary, RunEvidenceDetail, ArtifactEvidenceRef, MissingEvidenceNotice,
  RuntimeEvidenceReadResult) and 2 public functions (list_run_evidence_summaries,
  read_run_evidence_detail).

  Read model characteristics:
  - Reads only persisted .ariadne/runs/<run_id>/ artifacts (run.json, manifest.json, run-report.txt)
  - Requires explicit runs_root — no CWD assumption
  - No file writes, no shell-out, no git/gh/Docker, no run_ariadne_task invocation
  - Missing/malformed evidence explicitly represented via MissingEvidenceNotice (no crashes)
  - PR URL only from persisted evidence (never fabricated)
  - Deterministic run sorting (reverse by run_id)
  - Payload cleanliness and readiness fields present as Optional

  32 tests pass in 0.13s covering:
  - Empty/missing runs, complete run, missing manifest/report
  - Malformed run.json/manifest, PR URL present/absent
  - Deterministic sort, detail evidence, evidence paths, run_json_hash
  - No shell-out, no mutation, no run_ariadne_task, no real git repo, no real .ariadne
  - Type structure validation for all 5 dataclasses

  All validation passes:
  - Compileall: EXIT:0
  - Focused tests: 32 passed
  - Regression tests: 472 passed
  - No forbidden files modified (ROADMAP.md, product/, roadmaps/, previous PRs, agents, all clean)
  - PLAN DRIFT GATE and NO-DRIFT CHECK present with correct all-caps casing (warning resolved)
  - No UI screens, Artifact Workspace Shell, Visual Gate, or frozen streams opened
