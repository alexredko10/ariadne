decisions_made:
  - decision: "OPTION B implemented — minimal ASGI runtime wrapper with uvicorn"
    reason: "local_operator.py creates wrapper ASGI app that injects runs_root, delegates to uvicorn. No custom HTTP server. Single supported entrypoint."
  - decision: "POLICY A implemented — server-owned runs root via app factory"
    reason: "server.py accepts optional runs_root parameter. Operator wrapper injects it into scope['app_runs_root']. Evidence routes check scope before query string. Browser cannot override operator root."
  - decision: "Safe loopback defaults with guarded exceptions"
    reason: "Default host 127.0.0.1, port 8000. 0.0.0.0 requires --allow-public-bind with warning. Ports <1024 require --allow-privileged-port. Host/port validated before launch."
  - decision: "Canonical end-to-end smoke passes all assertions"
    reason: "Smoke created canonical persisted run via persist_run_record(), launched operator as subprocess, verified health+workspace+runs+detail+report, checked all four zones and hooks, verified security mode (browser override ignored). Process cleanup confirmed."
  - decision: "PR 0143–0147 behavior fully preserved — all 310+227 tests pass"
    reason: "All existing workspace, detail, serialization, evidence, and persistence tests pass. server.py change is additive (optional runs_root parameter). No behavior regressed."
  - decision: "PR 0147B and later roadmap slots preserved"
    reason: "PR 0148 numbering unchanged in ROADMAP.md. No orchestration, agent launch, mutation, or later roadmap capabilities absorbed."
