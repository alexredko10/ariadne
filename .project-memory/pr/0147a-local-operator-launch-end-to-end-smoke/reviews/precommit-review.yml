    reason: "All claims verified: 35 operator tests, 310 workspace tests, 227 regression tests, smoke exit 0, no lingering process, no .ariadne mutation, OPTION B, POLICY A, CLI validation, runs-root security, startup diagnostics, runbook completeness."
