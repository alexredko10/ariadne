summary: |
  PR 0140 plan review APPROVES.

  PLAN.md defines PR 0140 as a workflow-hardening PR that encodes the Implementation Handoff Artifact Contract. After PR 0140 is merged, every future implementation agent must write .project-memory/pr/<PR-ID>-<slug>/IMPLEMENTATION_REPORT.md before precommit-review. The report is handoff context, not proof — agent output remains not proof; runtime-captured evidence remains the source of truth.

  Key workflow decisions:
  - IMPLEMENTATION_REPORT.md required with 11 sections (TASK SUMMARY, FILES READ, FILES CHANGED, IMPLEMENTATION DECISIONS, PLAN ALIGNMENT, DEVIATIONS FROM PLAN, VALIDATION RUN, BOUNDARY CONFIRMATIONS, NON-GOALS PRESERVED, RISKS OR WARNINGS, NEXT REVIEWER FOCUS)
  - Precommit-review must read PLAN.md, plan-review.yml, IMPLEMENTATION_REPORT.md, actual changed files, validation outputs, dirty tree, cached diff, PLAN DRIFT GATE, and NO-DRIFT CHECK
  - If sources disagree, actual file evidence, validation evidence, and PLAN.md win
  - Unsupported IMPLEMENTATION_REPORT.md claims must block or warn
  - Missing IMPLEMENTATION_REPORT.md is a blocker after merge (unless explicitly exempted by PLAN.md)
  - No retroactive requirement for PRs 0137, 0138, or 0139
  - The contract applies to future implementation PRs only

  Implementation files:
  - .project-memory/workflow/IMPLEMENTATION_HANDOFF_ARTIFACT_CONTRACT.md (new) — workflow contract artifact
  - .project-memory/templates/IMPLEMENTATION_REPORT_TEMPLATE.md (new) — reusable template with proof boundary disclaimer
  - .project-memory/ORCHESTRATOR_STANDARD.txt (narrow update) — add IMPLEMENTATION_REPORT.md references in coder and precommit-review sections
  - agents/coder.yml (narrow update) — include IMPLEMENTATION_REPORT.md in allowed write paths
  - agents/precommit-review.yml (narrow update) — include IMPLEMENTATION_REPORT.md in required reads and comparison gate

  No runtime, UI, task_intake, runner, schema, dependency, or previous PR artifact changes. No frozen streams opened. All 36 required checks pass. Evidence boundaries preserved — implementation reports are not proof.
