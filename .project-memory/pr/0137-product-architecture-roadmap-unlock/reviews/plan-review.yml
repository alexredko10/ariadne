summary: |
  PR 0137 Product Architecture Roadmap Unlock plan-review APPROVES.

  This PR is a narrow artifact-only transition PR that:
  1. Preserves the Ariadna Product Master Prompt as a durable source artifact
  2. Writes a derived post-0136 product roadmap with ~52 PRs across 10 streams
  3. Preserves PROMPTS.md as a prompt artifact
  4. Closes the Production Line hardening stream (PR 0131-0136)
  5. Opens Artifact Workspace Read-Only UI as the next active stream
  6. Keeps UI mutation, agent launch from UI, commit from UI, and PR creation from UI frozen
  7. Stages Context Core, Decision Core, Rubrics, Model Router, and ETL/ERP demo for later streams

  Product identity and architecture principles are consistently preserved across all three artifacts (source, roadmap, PLAN.md):
  - Ariadna = runtime package + artifact workspace + agent orchestration substrate
  - Model is replaceable, substrate is durable
  - Agent may generate, runtime must verify, human owns root purpose
  - Artifacts make intermediate meaning visible
  - Agent output is not proof; runtime-captured evidence is source of truth

  All validation checks pass:
  - Branch correct: 0137-product-architecture-roadmap-unlock
  - No tracked files modified
  - No staged files
  - Only expected PR 0137 untracked artifacts exist
  - All 4 required artifacts present and readable
  - Artifact classification in PLAN.md is distinct and correct
  - Stream transition is explicit and correctly ordered
  - Frozen boundaries are comprehensive
  - Roadmap artifact is coherent with ~52 PRs
  - Forbidden scope (services, agents, schemas, dependencies, ROADMAP.md, previous PRs) is clean
