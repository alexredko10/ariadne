decisions_made:
  - decision: "PR 0147B is an architect-authorized governance insertion preserving PR 0147C, PR 0147D, and PR 0148 numbering"
    reason: "PLAN.md explicitly defers PR 0147C (Domain-Neutral Profile Contracts), PR 0147D (Construction Estimate Dogfood Adapter), and PR 0148 (Mermaid Artifact Type Read Model). ROADMAP.md and ARIADNA_PRODUCT_ROADMAP_AFTER_PR0136.md both document PR 0147B-D as governance insertions that do not renumber PR 0148."
  - decision: "OPTION B — Dedicated Manual Orchestration Store with Run Bridge is the selected architecture"
    reason: "PLAN.md explicitly selects OPTION B with rationale: run_persistence fields designed for automated pipeline runs; manual sessions may never produce a classic run; adding orchestration fields to RunPersistenceRequest would create ambiguity; GET /runs contract is intentionally scoped. The dedicated `.ariadne/orchestration/` store cleanly separates concerns."
  - decision: "Manual orchestration mode does not create a second conflicting control plane"
    reason: "The dedicated store is explicitly read-displayed through a new GET /orchestration/<session_id> route. No POST, PUT, PATCH, or DELETE orchestration routes exist. The local operator remains read-only. CLI mutation is explicit and human-run. The existing run persistence and Artifact Workspace are unchanged."
  - decision: "Stage state machine is deterministic with exact transition table"
    reason: "PLAN.md defines 8 stage statuses (pending, ready, in_progress, completed, blocked, revision_required, human_action_required, closed) with explicit allowed-transition lists for each. Stage order gates (planning lock, plan-review verdict, precommit readiness) are exact. Stale-state detection via expected hash is exact."
  - decision: "Action proposals are inert — no execution, no eval, no shell=True"
    reason: "PLAN.md explicitly prohibits eval, shell=True, untrusted shell interpolation, and command execution. argv is the canonical representation. Proposals are state-bound via session_state_hash. Stale proposals must not be presented as current. Proposal_id is deterministic sha256."
  - decision: "Human checkpoints record intent only — proceed_manually does not execute or unlock"
    reason: "PLAN.md explicitly states: 'proceed_manually changes session status to human_action_required — it does NOT execute anything.' Checkpoint has deterministic checkpoint_id. Human actor and reason are required."
  - decision: "HTTP remains read-only — no POST/PUT/PATCH/DELETE orchestration routes"
    reason: "PLAN.md specifies GET-only for orchestration: 'GET /orchestration/<session_id>'. Mutation occurs only through explicit human-run CLI commands. No server-start side effect, no browser-open side effect, no background worker, no daemon."
