artifact_store_inventory_assessment: >
  PLAN.md correctly describes ArtifactStore: caller-provided Path root,
  sha256/first2/full layout, atomic write (.tmp_ rename), kinds including
  RAW_DIFF, NORMALIZED_PATCH, APPLY_REQUEST, RUN_RECORD_SNAPSHOT, GENERIC_TEXT,
  GENERIC_JSON. Observed in artifacts.py. Path safety via resolve() containment
