  PLAN.md correctly inventories the four-agent workflow: planner produces PLAN.md,
  plan-review produces reviews/plan-review.yml with approve/warning verdict and
  empty blockers, coder produces implementation files + IMPLEMENTATION_REPORT.md,
  precommit-review produces reviews/precommit-review.yml with pass/warning verdict
  and commit_readiness ready. This matches agents/planner.yml, agents/plan-review.yml,
  agents/coder.yml, and agents/precommit-review.yml.
review_boundary_inventory_assessment: >
  PLAN.md correctly describes review_boundary.py as a pure deterministic function
