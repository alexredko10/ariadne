architecture_option_assessment: >
  PLAN.md explicitly selects OPTION B (Dedicated Manual Orchestration Store with
  Run Bridge). Rationale is provided: run_persistence fields are designed for
  automated runs, manual sessions may never produce a classic run, adding
  orchestration fields would create ambiguity, GET /runs contract is intentionally
  scoped. Decision is unconditional — not open to both options.
canonical_storage_assessment: >
  Canonical storage is `.ariadne/orchestration/<session_id>.json` with ArtifactStore
  at `.ariadne/orchestration/artifacts/`. Session IDs are deterministic sha256 of
  import packet JSON. Session state hash is sha256 of canonical session JSON.
  Atomic write uses .tmp file + rename. Duplicate detection via existing file check.
  Stale-state rejection via expected hash match. One canonical source of truth
  (the session JSON file). No duplicate truth.
packet_contract_assessment: >
  ManualOrchestrationInput packet contract is versioned (schema_version "1") with
  session_id, prompts array, and validation rules: exactly four prompts, ordered
  roles, non-empty text <= 50,000 chars, UTF-8, deterministic prompt_sha256,
  session_id derivation, and rejection of malformed/missing/duplicate/unsupported
  oversized prompts. Complete and unambiguous.
prompt_artifact_assessment: >
  Prompt artifacts are stored via ArtifactStore at `.ariadne/orchestration/artifacts/`
  with media type `text/plain; charset=utf-8`, kind label `prompt_<role>`,
  full sha256 hash of UTF-8 encoded text, 50,000 char size limit. Binary content
  rejected. Prompts are rendered as inert plain text. Never executed. Prompts are
  not represented as proof.
session_identity_hash_assessment: >
  Session ID is deterministic: sha256(canonical import JSON)[:16]. Session state
  hash is sha256(JSON-serialized canonical session file)[:16]. Previous state hash
  required for all mutations. Stale detection via expected hash match. Expected
  hash header at CLI level. Deterministic and verifiable.
stage_state_machine_assessment: >
  State machine has 8 statuses (pending, ready, in_progress, completed, blocked,
  revision_required, human_action_required, closed) with exact transition table
  and required conditions. Three stage-order gates enforce planning lock (stage 2
  requires stage 1 completed), plan-review verdict gate (stage 3 requires stage 2
  approve/warning), precommit readiness gate (stage 4 requires stage 3 completed).
  Final human_action_required requires all four stages completed. Stale transitions
  rejected via hash. Duplicate transitions deterministic. Conflicts rejected.
stage_evidence_assessment: >
  Per-stage evidence record includes role, stage, status, prompt_sha256, prompt_ref,
  artifact_sha256, artifact_ref, previous_state_hash, resulting_state_hash, verdict,
  blockers, revision_reason, recorded_by. Completed stages require artifact evidence
  with hash. Review verdicts are physically read (not inferred). Agent identity is
  metadata. Agent output is not proof. Evidence and claims are visibly separate.
review_gate_assessment: >
  Plan-review gate: completed requires PLAN.md and reviews/plan-review.yml to exist
  with approve/warning verdict (not block). Precommit-review gate: completed requires
  IMPLEMENTATION_REPORT.md and reviews/precommit-review.yml to exist with pass/warning
  verdict (not block). Verdicts are read from physical files, not inferred.
action_proposal_assessment: >
  Action proposals are inert records with deterministic proposal_id (sha256 of
  proposal JSON), session_id, action_type, argv tuple, working_directory,
  expected_branch, expected_head, expected_changed_files, expected_payload_hash,
  session_state_hash, risk_level, rationale, created_by. Rules: argv is canonical
  representation; no eval, no shell=True, no untrusted shell interpolation;
  credentials/secrets prohibited; stale when session_state_hash mismatch; stale
  proposals not presented as current. Risk classification is explicit (high).
secret_exclusion is explicit.
human_checkpoint_assessment: >
  Human checkpoints record intent only with deterministic checkpoint_id
  (sha256 of checkpoint JSON), session_id, decision (proceed_manually, stop,
  revise, defer), human_actor, reason, proposal_id, proposal_hash,
  session_state_hash, decision_record_hash. proceed_manually does NOT execute
  or unlock anything. stop marks session closed. revise marks revision_required.
  defer leaves current status. Checkpoint is not evidence of command success.
external_action_result_assessment: >
  External action results are optional operator-supplied records with result_id,
  proposal_id, session_id, reported_status (success/failure/result_unavailable),
  evidence_refs, operator_notes, recorded_by. reported_status is operator-reported,
  not runtime-verified. Never infer success from checkpoint alone. Evidence refs
  are optional pointers. Reported success is not called verified success.
cli_assessment: >
  CLI contract: `python -m task_intake.manual_orchestration_cli <subcommand> [args]`
  with 9 subcommands (import-session, stage-status, record-evidence, record-blocked,
  propose-action, checkpoint, record-result, show-session, list-sessions). All
  mutation subcommands require `--expected-hash` for stale-state protection. Exit
  codes: 0 success, 1 validation error, 2 stale state, 3 not found. Deterministic
  JSON output via `--json` flag. No server-start side effect. No browser-open side
  effect. No background worker. No daemon.
read_model_api_assessment: >
  GET /orchestration/<session_id> is a new read-only route returning versioned JSON
  with ev_contract_version "1", ok flag, and session record (session_id, status,
  stages, action_proposals, human_checkpoints, external_action_results,
  session_state_hash). State handling: ok=false for missing/malformed/invalid
  session_id. The route is additive to version-1 contract — does not modify GET /runs.
  Path validation uses _RUN_ID_RE regex. Read-model behavior: session data only,
  no general filesystem browser.
artifact_workspace_assessment: >
  Artifact Workspace displays orchestration sessions through a new read-only surface.
  PLAN.md specifies a new `#orchestration-session` section or dedicated tab showing
  session status, four ordered stages with role/status/evidence links, action proposals
  with inert display, human checkpoints with decisions. All text rendered safely via
  textContent. No mutation buttons. No execute/run controls. Preserves all existing
  workspace behavior (PR 0143 timeline, PR 0144 list, PR 0145 detail, PR 0146 report,
  PR 0147 proof/manifest, PR 0147A local operator). The local operator remains
  read-only. No ev_contract_version break.
safe_rendering_assessment: >
  PLAN.md specifies exact safe-rendering rules: prompt text as inert plain text via
  textContent; action argv as inert text (not linked or clickable); paths in prompts
  as inert text; URLs in prompts as inert text; hash values as inert text; HTML,
  script, Markdown, Mermaid, ANSI, shell commands — all rendered as inert text.
  No mutation controls. No eval. No document.write. Complete.
atomicity_stale_state_assessment: >
  Atomic write: .tmp file + os.replace. Idempotent identical write: return existing
  ref if content matches. Stale detection: all mutation CLI commands require
  --expected-hash; stale rejection with exit code 2. Duplicate detection: if
  resulting hash produces existing session record, report as duplicate. Conflicting
  transitions rejected by stale-state detection. Partial-write behavior: atomic
  rename ensures no partial session file. Readback behavior: session file is read
  after write to verify.
pr0143_pr0147a_preservation_assessment: >
  PLAN.md specifies exact preservation: server.py routes are unchanged (new route
  added); local_operator.py is unchanged; artifact_workspace.py orchestration
  display added without modifying existing zone behavior; GET /runs, detail, report
  unchanged; four workspace zones unchanged; timeline, canvas, gates, logs unchanged;
  read-only operator status unchanged; runs_root security unchanged. PR 0143 (4-zone
  shell), PR 0144 (run list), PR 0145 (detail panel), PR 0146 (report viewer),
  PR 0147 (proof/manifest), PR 0147A (local operator) are all preserved.
pr0147c_pr0147d_pr0148_deferral_assessment: >
  PLAN.md explicitly defers PR 0147C (Domain-Neutral Profile Contracts), PR 0147D
  (Construction Estimate Dogfood Adapter), and PR 0148 (Mermaid Artifact Type Read
  Model). ROADMAP.md and ARIADNA_PRODUCT_ROADMAP_AFTER_PR0136.md both confirm
  PR 0148 numbering is unchanged. PR 0147C and PR 0147D are separate slots. No
  completed historical PR is redefined. Batching policy compliance: this is a
  coherent multi-step capability unit, not a single isolated UI change.
universality_assessment: >
  PLAN.md's approach is universal: the manual orchestration mode works for any
  four-agent workflow with planner, plan-review, coder, precommit-review roles.
  The architecture is independent of specific domain adapters or agents. The
  dedicated store pattern with deterministic hashing and read-only display is
  broadly applicable.
implementation_scope_assessment: >
  PLAN.md defines an exact implementation allowlist with 12 approved files (6 new,
  4 edits, 2 post-implementation review artifacts). Not modified: pyproject.toml,
  Makefile, README.md, agents/**, schemas/**, .github/**, services/runner/**,
  services/task_intake/src/task_intake/local_operator.py, runtime_evidence_serialization.py,
  app.py, doctor.py, and all test files except test_artifact_workspace_shell.py.
  File scope is unconditional.
test_contract_assessment: >
  Test plan includes 6 test commands: manual orchestration unit tests, workspace
  orchestration display tests, end-to-end smoke, existing workspace regression,
  existing route tests, serialization/evidence regressions. Each command has
  expected result and block consequence. Comprehensive tests cover schema validation,
  state transitions, stale-state rejection, duplicate detection, stage-order gates,
  review-verdict gates, action proposal hashing/staleness, checkpoint non-execution,
  atomic writes, safe path handling, forbidden-action validation.
smoke_assessment: >
  End-to-end smoke (scripts/smoke-manual-orchestration.py) creates import packet,
  imports session, progresses through four stages, exercises blocked transition,
  rejects stale hash, creates proposal, records checkpoint, proves no command
  executed, exposes through GET route, verifies workspace markers, cleans up temp
  directory. Smoke uses isolated temporary directory. No repository runtime residue.
  Proves non-execution.
compatibility_assessment: >
  Existing evidence-contract compatibility: ev_contract_version "1" is preserved in
  GET /orchestration/<session_id> responses. Missing/partial/blocked/malformed/stale/
  unsupported states are handled explicitly. Legacy-run behavior is unchanged. List
  and detail bounds are specified. Controlled prompt/proposal/checkpoint viewing.
  No general filesystem browser. Artifact Workspace integration is additive. Four
  ordered stages visible. Prompt availability visible. Artifact evidence state visible.
  Review verdict visible. Blockers/revisions visible. Current state hash visible.
  Human action requirement visible. Proposal status visible. Checkpoint status visible.
  Runtime evidence, agent claims, human intent, external results are distinct.
