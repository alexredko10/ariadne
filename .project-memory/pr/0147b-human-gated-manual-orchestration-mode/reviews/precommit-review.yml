decisions_made:
  - decision: "OPTION B implemented — dedicated manual orchestration store"
    reason: "Canonical session path .ariadne/orchestration/<session_id>.json. Schema version '1', deterministic hashing, atomic writes, stale-state protection."
  - decision: "Exactly four roles and stages with evidence and verdict gates"
    reason: "planner (stage 1), plan-review (stage 2), coder (stage 3), precommit-review (stage 4). Planning-lock gate, plan-review verdict gate, precommit commitment_readiness gate. Completed stages require artifact_ref and artifact_sha256."
  - decision: "Proposals inert, checkpoints intent-only, external results separate"
    reason: "propose-action creates ActionProposal with no execution path. checkpoint records decision values (proceed_manually, stop, revise, defer) — none execute. external_result_record creates operator-reported results without fabrication."
  - decision: "CLI human-run with 9 non-executing subcommands"
    reason: "import-session, stage-status, record-evidence, record-blocked, propose-action, checkpoint, record-result, show-session, list-sessions. All mutation subcommands require --expected-hash. No subprocess/eval/os.system."
  - decision: "GET-only read route without HTTP mutation"
    reason: "server.py adds single GET /orchestration/<session_id> route with session_id validation. No POST/PUT/PATCH/DELETE orchestration routes."
  - decision: "PR 0143–0147A fully preserved — 345+73+194 tests pass"
    reason: "All workspace, operator, detail, serialization, evidence, persistence, artifact store, and review boundary tests pass."
  - decision: "PR 0147C/D and PR 0148 deferred — roadmap slots preserved"
    reason: "ROADMAP.md and detailed roadmap updated with PR 0147B insertion. PR 0148 and later numbering unchanged."
  - decision: "IMPLEMENTATION_REPORT.md claims verified against actual evidence"
    reason: "All claims verified: 39 orchestration tests, 345 workspace+operator, 73 detail, 194 evidence/serialization, smoke exit 0, no execution boundaries, no HTTP mutation, non-execution greps clean."
