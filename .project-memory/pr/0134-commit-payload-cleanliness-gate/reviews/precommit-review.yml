summary: |
  PR 0134 precommit review PASSES.

  Implementation adds a commit payload cleanliness gate as specified by PLAN.md:

  - PayloadCleanlinessResult frozen dataclass with 7 structured evidence lists
  - _KNOWN_RESIDUE_PATHS: captures, .ariadne, .project-memory/pr/test, .project-memory/pr/0127,
    .project-memory/pr/dogfood, test_stage_file.py
  - _FORBIDDEN_TRACKED_PATHS: agents/plan-review.yml, agents/precommit-review.yml,
    ROADMAP.md, .gitignore
  - 4 reason codes: commit_payload_forbidden_tracked_change, commit_payload_staged_residue,
    commit_payload_unknown_untracked, commit_payload_forbidden_cached_diff
  - _check_payload_cleanliness() classifies files into 3 buckets (allowed payload,
    known generated residue, forbidden/unknown) using git status --porcelain=v1
    and git diff --cached --name-only
  - Injectable provider pattern: payload_cleanliness_fn parameter on run_ariadne_task()
  - Integration at 4a-1 (after cleanup, before proof finalization)

  14 tests cover all required scenarios (untracked residue allowed, staged/tracked residue
  blocked, unknown untracked blocked, 4 forbidden file types blocked, cached diff blocked,
  approved payload passes, evidence lists, reason codes, full task integration).

  All validation passes:
  - Compileall: EXIT:0
  - Focused tests: 194 passed
  - Regression tests: 444 passed
  - Gate-specific tests: 14 passed
  - Forbidden tracked files clean
  - Git Boundary authority preserved
  - PR 0132/0133 behavior preserved
  - No frozen scope started
