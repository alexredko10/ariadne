decisions_made:
  - decision: "OPTION A — Run-Directory Visual Gate Sidecar selected"
    reason: "Follows established run-directory sidecar pattern (run.json, run-profile.json, manifest.json). Independent versioning, deterministic self-excluding hash, atomic write. Not embedded in run-profile.json (which is descriptive metadata, not gate truth)."
  - decision: "Visual Gate contract fully specified"
    reason: "13 top-level fields with exact name, type, required/optional, bounds, source, and evidence meaning. 16 validation failure reason codes. Deterministic canonical JSON with alphabetical key ordering. Self-excluding SHA-256 hash."
  - decision: "Required diagram contract fully specified"
    reason: "6 RequiredDiagramEntry fields. Allowed diagram_types: requirement, state, sequence. descriptor_ref uses profile_descriptor_key:<key> form. presence_state and validity_state are reader-computed, not stored. Duplicate diagram_id rejected."
  - decision: "Status state machine exact and bounded"
    reason: "Four statuses (pending, ready_needs_review, passed, failed) with exact consistency rules against human_review_required. No transition API — object is created once. Pending and passed represent pending/approved per roadmap. No false human-approval claims."
  - decision: "Human review semantics precise"
    reason: "human_review_required=true only for ready_needs_review. All contradictory combinations rejected with specific reason codes. human_review_required does not prove review occurred. PR 0152 deferred. No approval field."
  - decision: "Evidence references exact and safe"
    reason: "Three accepted forms: run-relative:, sha256:, profile_descriptor_key:. profile_descriptor_key is a new reference form specific to VisualGateResult, structurally immune to path attacks (no filesystem path, only a descriptor key). Existing validate_reference() applies to the other two forms."
  - decision: "API boundary minimal"
    reason: "One additive GET-only route: GET /runs/<run_id>/visual-gate-result. Server-owned runs_root. No UI mutation. No workspace changes. No HTTP mutation. No diagram viewer work."
  - decision: "PR 0148 Mermaid contract preserved"
    reason: "kind='mermaid', media_type='text/vnd.mermaid', controlled .mmd reads, inert source display — all unchanged. profile_schema_version '1' unchanged. VisualGateResult references Mermaid descriptors via profile_descriptor_key: refs, not by modifying the profile."
  - decision: "PR 0150-0152 explicitly deferred"
    reason: "No diagram rendering (PR 0150). No readiness enforcement (PR 0151). No human approval artifact (PR 0152). No Artifact Registry or acceptance state."
  - decision: "Commit readiness is ready"
    reason: "Verdict is approve, blockers is empty, OPTION A is fully locked, contract is exact, status and human-review semantics are exact, evidence references are exact, storage and hashing are exact, implementation allowlist is exact, validation and smoke are executable, both drift gates are sufficient."
