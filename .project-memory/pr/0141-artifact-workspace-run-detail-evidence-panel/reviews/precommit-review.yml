decisions_made:
  - decision: "Implementation matches PLAN.md — GET /runs/<run_id> detail route with safe run_id validation"
    reason: "server.py L915: 'if method == \"GET\" and path.startswith(\"/runs/\")' with _RUN_ID_RE = re.compile(r'^[a-zA-Z0-9_\\-]+$'). Uses read_run_evidence_detail(). Response fields match PLAN.md response shape."
  - decision: "Detail endpoint is GET-only and read-only"
    reason: "Route handler checks method == 'GET'. Non-GET methods on /runs/<run_id> fall through to catch-all (404). No POST/PUT/PATCH/DELETE routes added for /runs/<run_id>. No file writes, no dir creation, no shell-out in detail route."
  - decision: "Complete response state coverage"
    reason: "Server handles: ok=true for complete runs, ok=false with error for unknown run_id, ok=false with missing notices for missing run.json/manifest/report, ok=false with malformed notices for malformed manifest. payload_cleanliness=null, readiness=null per unavailable-value policy."
  - decision: "PR URL only from persisted evidence — never fabricated"
    reason: "pr_url sourced from RunEvidenceSummary.pr_url which comes from _extract_pr_url() in runtime_evidence.py. Test proves pr_url is None when absent from execution_results."
  - decision: "Missing and malformed evidence notices preserved — never silently omitted"
    reason: "Server serializes result.missing and result.malformed as lists of {expected_path, reason}. Panel JS renders missing/malformed notices with escHtml. Tests verify missing run.json, manifest, run-report and malformed manifest all produce notices."
  - decision: "Safe HTML rendering via escHtml using DOM textContent"
    reason: "escHtml() at L1949-1952 creates DOM element, sets textContent = esc(s), returns innerHTML. All persisted evidence values rendered through escHtml. report_preview in <pre> element uses escHtml."
  - decision: "Detail panel is deterministic and replaces content on each selection"
    reason: "fetchRunDetail (L1935) sets content.innerHTML = '<em>Loading...</em>' before fetch, then renderRunDetail replaces content with new HTML. No accumulation, no mutation controls."
  - decision: "Existing GET /runs and page sections preserved"
    reason: "GET /runs list route at L997 unchanged. All existing page sections (summary-card, Execution Trace, structured-view, feedback, session report) preserved. 73 run-list regression tests pass. POST /runs/execute preserved."
