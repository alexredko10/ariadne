commit_readiness: "ready"
summary: |
  PR 0139 precommit review PASSES.

  Implementation adds a narrow read-only local run list view at GET /runs in the existing
  task_intake ASGI server, backed by PR 0138's runtime_evidence.read_model. The route reads
  persisted .ariadne/runs/<run_id>/ artifacts through list_run_evidence_summaries() and
  returns JSON with all required fields: run_id, status, reason_codes, pipeline_status,
  git_boundary_status, execution_attempted, run_json_available, manifest_available,
  run_report_available, missing_evidence, malformed_evidence, pr_url (only when persisted),
  payload_cleanliness_available, and readiness_available.

  The HTML/JS UI is updated with fetchRuns() calling GET /runs on page load and after
  each POST /runs/execute, replacing the browser-only mock run history with evidence-backed
  data. Existing UI functionality (summary card, execution trace, structured view, feedback,
  session report) is fully preserved.

  Read-only guarantees:
  - No file writes, no shell-out, no git/gh/Docker, no run_ariadne_task invocation
  - No run detail panel, no Artifact Workspace Shell
  - PR URL only from persisted evidence (never fabricated)
  - Missing/malformed evidence explicitly represented (not hidden)
  - Deterministic ordering (newest first by run_id)

  All validation passes:
  - Compileall: EXIT:0
  - Focused tests: 41 passed in 0.09s
  - Read model + app tests: 73 passed in 0.19s
  - Regression tests: 1235 passed in 3.36s
  - PLAN DRIFT GATE and NO-DRIFT CHECK present in all-caps (casing warning resolved)
  - No forbidden files modified
  - Existing UI functionality preserved
