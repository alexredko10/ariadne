summary: >
  PR 0147D PLAN.md defines a complete, executable, safe, and tightly bounded
  implementation contract for the first real non-software dogfood adapter built
  on the PR 0147C run-profile contract. OPTION A (Strict UTF-8 CSV with exact
  12-column header) is selected with rationale. The source schema is fully
  specified with exact columns, types, and validation. Decimal arithmetic is
  required for all financial values with exact precision, scale, rounding,
  and line-total policy. Source immutability is guaranteed via SHA-256 before
  and after copy. PR 0147C profile schema remains unchanged — profile_key
  'construction-estimate-v1' uses existing six fact types, five evidence roles,
  and two reference forms. The generic workspace renderer is reused with no
  construction-specific branches. No HTTP mutation, no Artifact Registry, no
  quantity takeoff, no scheduling. PR 0148 is explicitly deferred. Roadmap
  alignment is complete. Minor warnings about the deferred csv import and the
  plan-review artifact write.
recommendations:
  - "Consider importing csv at module level for simplicity — it is standard library."
  - "Ensure the construction-estimate-sample.csv fixture file and all invalid fixtures are committed and versioned."
  - "Add explicit tests for BOM-stripping behavior and CRLF/LF line ending handling."
  - "Ensure the --create-run flag source-hash comparison includes the BOM-stripped bytes."
source_format_assessment: >
  Exactly one source format selected: Strict UTF-8 CSV. Unconditional. Selection
  rationale provided: mirrors real-world estimate exchange, standard-library csv
  module requires no dependency, strict header contract provides deterministic
  column mapping. XLSX rejected due to no approved dependency. JSON rejected as
  redundant schema. BOM stripping supported. CRLF and LF accepted. Blank rows
  silently skipped. Duplicate header detected and rejected.
source_schema_assessment: >
  Schema is fully specified with 12 exact case-sensitive headers: estimate_id,
  title, project_name, currency, line_item_id, description, category, quantity,
  unit, unit_rate, line_total, notes. All columns have exact types, required
  status, max lengths, and validation rules. line_item_id must match
  ^[a-zA-Z0-9_\-\.]+$ and be unique. estimate_id must be consistent across all
  rows. Missing-field behavior: line_total absent triggers recalculation as
  quantity * unit_rate. Duplicate line_item_id rejected. All 11 required
  columns must be present.
numeric_financial_assessment: >
  Decimal arithmetic required for all financial values using decimal.Decimal.
  Decimal separator is period (.), rejects comma as thousands separator.
  Thousands separator: none — digits only. Negative values rejected for
  quantity, unit_rate, line_total. Zero values rejected for quantity, unit_rate.
  Max precision 20 digits, max scale 4 decimal places. Rounding mode
  ROUND_HALF_UP. Line-total authoritative if supplied (must match quantity *
  unit_rate within 0.01), recalculated if absent. Subtotal computed as sum of
  line_totals. Grand total computed as sum of subtotal. No binary float enters
  canonical arithmetic.
unit_contract_assessment: >
  19 exact allowed values (each, hour, day, week, month, lump_sum, linear_foot,
  square_foot, cubic_foot, linear_meter, square_meter, cubic_meter, kilogram,
  tonne, pound, gallon, liter, percent) plus any other value accepted as valid
  but flagged as "unrecognized_unit" in validation report. Max 50 chars. No
  unit conversion or dimensional inference. No quantity takeoff.
source_safety_assessment: >
  Source is local only via --source path. Read-only — source is NEVER modified.
  Source writeback is explicitly forbidden. URLs rejected via path resolution.
  Network locations rejected via os.path.realpath() and containment check.
  Absolute path behavior: accepted if local file (path is resolved, then
  checked). Traversal: resolved realpath must be under expected directories
  (hardening). Symlink: optional hardening to reject symlinks escaping
  expected directories. Max source size 1 MB. Max 1000 rows. UTF-8 only with
  BOM stripping. Source hash SHA-256 of complete file bytes (excluding BOM).
  Source-changed-during-read: hash comparison before and after copy. No browser
  upload or browser path selection.
profile_mapping_assessment: >
  Profile schema version remains "1". No new fact value type added — uses text
  (estimate_id, project_name, currency, source_format, validation_status),
  number (item_count, category_count), currency (subtotal, grand_total). No
  new evidence role added — uses input, output, report, supporting. No new
  reference form added — uses run-relative: and sha256:. profile_key is
  "construction-estimate-v1". Facts are exact with deterministic ordering.
  Artifact groups exact (original, normalized, validation). Artifact
  descriptors exact. Required and optional states exact. Profile mapping is
  deterministic. Profile metadata labelled "not runtime proof." Profile
  presence does not imply acceptance or approval. Source estimate reference
  is run-relative:source-estimate.csv. Line-item detail does not overflow
  neutral facts (summary-level facts only).
artifact_mapping_assessment: >
  Source descriptor: key source_csv, kind source_file, evidence_role input,
  media_type text/csv, ref run-relative:source-estimate.csv, required true.
  Normalized representation: key normalized_json, kind normalized_data,
  evidence_role output, media_type application/json. Summary artifact: key
  line_items_csv, kind itemized_list, evidence_role report, media_type text/csv.
  Validation artifact: key validation_report, kind validation, evidence_role
  supporting, media_type text/plain, required false. All references use
  run-relative: form. SHA-256 computed for each copied artifact. No Artifact
  Registry or lifecycle state. Missing behavior: if validation_report fails,
  the optional descriptor is absent.
cli_assessment: >
  One entrypoint: scripts/create-construction-estimate-profile.py. Arguments:
  --source (required, controlled local path), --runs-root (required, validated),
  --run-id (required), --create-run (optional flag), --json (optional). Exit
  codes: 0 success, 1 validation/processing error, 2 unsafe/missing source.
  No agent, provider, network, shell, git, gh, Docker behavior. No server or
  browser side effects. Source remains unchanged. run.json remains unchanged
  except when --create-run is used (creates canonical run via
  run_persistence.persist_run_record() before processing).
read_only_surface_assessment: >
  Existing GET /runs/<run_id>/profile is reused. No construction-specific API
  added. No HTTP mutation exists. Existing generic workspace renderer is reused.
  No construction-specific JavaScript or Python rendering branch. No editing
  controls. No upload controls. No approve/reject controls. No recalculation
  controls. Canonical runtime evidence remains primary (profile metadata is
  labelled "not runtime proof").
synthetic_fixture_assessment: >
  Fixture is fictional: EST-001 Sample Warehouse Construction, Acme Industrial
  Park. No real customer data, no personal data, no supplier secrets, no
  proprietary pricing. 7 line items across multiple categories (site_prep,
  foundation, structure, roofing, electrical, plumbing, hvac). Multiple units
  (lump_sum, square_foot, tonne). Deterministic totals (subtotal 662,500.00,
