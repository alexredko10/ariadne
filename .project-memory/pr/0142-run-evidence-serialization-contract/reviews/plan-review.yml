    reason: "PLAN.md Future Breaking Versions: breaking version (ev_contract_version: '2') allowed only when existing field must be removed/renamed/semantics-changed, or route/HTTP behavior must diverge. Requires architect sign-off, new PLAN.md, new PR. Cannot be silently introduced. PLAN explicitly blocks existing field removal, rename, type narrowing, semantic reinterpretation, null-to-false, array-to-null, fabricated defaults, incompatible HTTP, changed GET-only, hidden breaking changes, and consumer dependence on object-key ordering."
  - decision: "Serialization design is pure — no filesystem, no ASGI routing, no mutation"
    reason: "PLAN.md Serialization Helper: pure functions (serialize_run_evidence_summary, serialize_run_evidence_detail, serialize_run_index) taking read-model dataclasses and returning dicts. Explicit list of what helper must not contain: no filesystem access (os.path, open, os.listdir, os.makedirs), no ASGI routing (scope, send, receive, path matching), no mutation (no writes, git, gh, agents, Docker, subprocess), no import of server.py or ASGI-specific modules."
  - decision: "Both route families covered with same contract rules"
    reason: "PLAN.md Implementation Design: serialize_run_index for GET /runs, serialize_run_evidence_detail for GET /runs/<run_id>. Both use serialize_run_evidence_summary for run entries. Both add ev_contract_version. Server.py changes limited to replacing inline dict construction with helper calls."
