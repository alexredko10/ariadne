  - decision: "Versioned contract with exact key sets, null policy, empty-array policy, and missing-field policy"
    reason: "PLAN.md Versioned Contract section defines ev_contract_version: '1' (string) present in every response state. Exact key sets for 7 structures: Run-Index Envelope, Run-Index Entry, Run-Detail Envelope, Run-Detail Summary, Run-Detail Evidence, Evidence Notice, Error Envelope. Null policy: null means unavailable; no null-to-false or null-to-empty-string substitution. Empty-array policy: [] when absent; no array-to-null substitution. Optional-field policy: every key always emitted. Unknown-additive-field consumer policy: consumers must tolerate unknown keys."
