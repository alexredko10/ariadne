summary: |
  PR 0131K fixes the porcelain path parsing bug in `_check_git_baseline`. The old code
  `line = line.strip()` removed the leading space from git porcelain output ' M .project-memory/...',
  causing `line[3:]` to skip the leading dot and extract 'project-memory/...' instead of
  '.project-memory/...'. The fix: `raw = line.rstrip('\n\r')` + `filename = raw[3:].rstrip()`
  — strips only trailing \\n/\\r, preserving the leading space so `raw[3:]` correctly indexes
  into the original porcelain line. For ' M .project-memory/...': raw[3:]='.project-memory/...'
  (dot preserved). 0131H/0131I/0131J fixes preserved. 409/409 regression tests pass.
  No alias workaround, no frozen scope, no real git/gh/Docker in production.
