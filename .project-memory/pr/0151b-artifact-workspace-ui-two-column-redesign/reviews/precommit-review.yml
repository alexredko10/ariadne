## CDN Allowlist Assessment

All 14 GET `/` test files enforce **exact set-based CDN allowlist**:

```python
import re
urls = set()
for m in re.finditer(r'(?:href|src)="([^"]+)"', html):
    u = m.group(1)
    if u.startswith("http") or u.startswith("//"):
        urls.add(u)
assert urls == {"https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css"}
assert "unpkg" not in html.lower()
assert "jsdelivr" not in html.lower()
```

