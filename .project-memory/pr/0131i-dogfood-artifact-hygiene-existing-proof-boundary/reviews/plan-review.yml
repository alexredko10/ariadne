    reason: "PLAN Section 3 changes test_agent_runner_bridge.py::test_no_real_pr_artifacts_created (L1171) and test_pipeline_runner.py::test_no_real_pr_artifacts_created_in_tests (L1506) from 'assert not ...exists()' to snapshot-and-assert-unchanged pattern. Snapshot captures committed content (or None if absent), test runs, then asserts artifact unchanged. Catches test mutations. Passes on both pre-#150 (artifact absent) and post-#150 (artifact tracked) states. Confirmed: dogfood-proof.yml exists on 0131I branch (git ls-files 100644) which would make assert-not-exists FAIL."
