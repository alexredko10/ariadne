    reason: "All 15 mandatory checks pass. Three concrete hygiene gaps identified and confirmed: (1) dogfood-proof.yml tracked on 0131I branch (git ls-files stage 100644 from PR #150 merge cec039c) causes assert-not-exists tests to FAIL — plan changes to snapshot-and-assert-unchanged pattern; (2) captures/ blocked as forbidden payload prefix — plan adds cleanup step before baseline; (3) .ariadne/ blocked as forbidden payload prefix — plan moves to IGNORED_BASELINE_PREFIXES. Proof finalization preserved from 0131H. Dirty baseline safety preserved for unrelated files. Narrow scope. No frozen streams."
