    reason: "PLAN Section 1 confirms: dogfood-proof.yml path does NOT match .ariadne/, captures/, or reviews/ prefixes. When CLI includes proof path in --allowed-file and --stage-file, finalized proof passes baseline (in allowed_set, not forbidden prefix). Commit-then-modify scenario: committed weak proof from #150 modified by CLI finalization → git status shows modified file → passes baseline because path is in allowed_set and not forbidden prefix. No code change needed to baseline logic for this case."
