    evidence: "PLAN.md 'Required Test Updates' section lists only one test change (test_no_external_assets -> test_allowed_cdn_only). The 'Existing Test Preservation Matrix' row for test_no_external_assets states 'UPDATE: Allow cdnjs.cloudflare.com while blocking unpkg/jsdelivr'. This is correct but the plan should also verify that the test suite for test_local_run_history_in_page.py continues to pass with all 40+ existing tests unchanged — since many assert on element IDs and text that will be restructured in the new layout."
    required_fix: "After cleaning the dirty tree, verify that the PLAN.md's existing element ID preservation list is complete by running the existing test suite against the current server.py to establish a baseline test count."
warnings:
  - id: "W001"
    description: "PR 0152 is numbered as a product roadmap slot (Visual Gate / Mermaid Stream, PR 0148-0152) but the plan describes it as 'Artifact Workspace UI Redesign (Stream 1)' in the roadmap alignment table. The ROADMAP.md Stream 3 runs PR 0148-0152 for Visual Gate/Mermaid. PR 0152 is the last slot in Stream 3 and should continue Visual Gate/Mermaid — not switch to a UI redesign."
    evidence: "PLAN.md roadmap alignment says 'Artifact Workspace UI Redesign (Stream 1)' but ROADMAP.md assigns PR 0152 to Stream 3 (Visual Gate / Mermaid) as 'Human Visual Approval Artifact'. The plan does not cite architect sign-off for this stream change."
    recommendation: "Either rename this PR to use a different number slot outside Stream 3, or obtain explicit architect sign-off for renaming/reusing PR 0152."
  - id: "W002"
    description: "The Bulma CDN URL cdnjs.cloudflare.com is a runtime network dependency for the HTML page. The plan states 'no CSP header is set by the existing server.py' and the CDN link is only a stylesheet (<link>), not a script. This is acceptable for a dev tool UI but introduces a new runtime network dependency. If the CDN is unreachable, the page will render without Bulma styling (graceful degradation via HTML semantic elements)."
    evidence: "PLAN.md CDN Verify section states Bulma 0.9.4 CSS at cdnjs.cloudflare.com is stable. The page will continue to function without the stylesheet (no JS dependency)."
    recommendation: "Document in PLAN.md that the CDN link is a <link> stylesheet only (no JS), and the page degrades gracefully without it. Consider whether to document a fallback or future bundling strategy."
  - id: "W003"
    description: "PLAN.md describes JS function preservation for 30+ functions and 15+ element IDs. The test file has 41 tests across 4 classes. The plan should verify that the current test count for test_local_run_history_in_page.py is actually 41 (the number in the plan) by running the existing tests, not by trusting the plan summary."
    evidence: "PLAN.md states '41 tests across 4 classes' for test_local_run_history_in_page.py. Precommit-review from PR 0139 (which last ran these tests) shows 41 passed. Current file grep shows 15+ test methods plus helper fixtures — 41 is plausible but should be verified with a baseline run."
    recommendation: "Run the existing test suite on the current branch to establish a baseline count before implementing any layout changes."
