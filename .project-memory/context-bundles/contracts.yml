version: "0.2"
label: "contracts"
purpose: "Safety, scope and validation contracts shared by all agents."
read_first:
  - ".project-memory/project_contract.yml"
  - ".project-memory/anchors.yml"
  - ".project-memory/run-record.schema.yml"
anchors:
  - "repo.canonical-write.single-gate"
  - "agents.no-git-mutation"
  - "agents.no-secrets"
  - "patch.repo-relative-only"
  - "human-approval.high-risk"
  - "agents.run-record.required"
  - "agents.run-record.path-pattern"
  - "agents.run-record.per-pr-aggregate"
  - "agents.run-record.run-id-required"
  - "agents.run-record.run-id-unique"
  - "agents.run-record.base-sha-source"
  - "agents.run-record.snapshot-verification-fields"
  - "agents.run-record.author-type"
  - "agents.run-record.repo-relative-posix-paths"
  - "agents.run-record.sanitized-evidence"
  - "agents.run-record.bounded-evidence"
  - "agents.run-record.no-secrets"
  - "agents.run-record.evidence-not-authority"
  - "agents.run-record.no-automatic-memory-writes"
  - "agents.run-record.no-backfill"
allowed_scan:
  - ".project-memory/project_contract.yml"
  - ".project-memory/anchors.yml"
  - ".project-memory/run-record.schema.yml"
avoid_scan:
  - ".git/**"
  - ".venv/**"
  - "node_modules/**"
  - "artifacts/**"
notes:
  - "Check project_contract.yml protected_behaviors before any edit."
  - "Human approval required for high-risk operations listed in project_contract.yml."
  - "Run record schema defined in .project-memory/run-record.schema.yml — see contract ids agents.run-record.* for rules."
  - "Feature Workspace Memory: run records are the evidence layer for future automated memory aggregation."
