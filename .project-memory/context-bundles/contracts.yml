notes:
  - "Check project_contract.yml protected_behaviors before any edit."
  - "Human approval required for high-risk operations listed in project_contract.yml."
  - "Run record schema defined in .project-memory/run-record.schema.yml — see contract ids agents.run-record.* for rules."
  - "Run record schema hardened in PR 0019 — run_record_path and run_id reference semantics required by Apply Gate."
  - "Apply Gate contract defined in .project-memory/apply-gate.schema.yml — see contract ids agents.apply-gate.* for rules."
  - "Apply Gate defines human/HITL canonical write authorization and does not perform apply."
  - "Workspace Feature Record is contract-only in PR 0024. No .ariadne/** or feature instances introduced."
  - "Future work: .ariadne/features/{id}.yml storage and Context Steward archival runner implementation."
  - ".ariadne/features/{id}.yml is the future physical storage path for Workspace Feature Records (ADR 0001)."
  - "PR 0025 creates no actual .ariadne/** files. Only ADR, contract ids, anchors, and references are added."
  - "Context Steward archival is contract-only in PR 0026. No runtime implementation."
  - "Future destination: .ariadne/features/{feature_workspace_id}.yml (Context Steward writes)."
  - "Task Intake Request Contract is contract-only in PR 0028. No service code changes."
  - "Runner handoff from Task Intake requires a future Task Intake → Runner Handoff Contract."
  - "Intake acceptance does not create run records or .ariadne/** writes."
