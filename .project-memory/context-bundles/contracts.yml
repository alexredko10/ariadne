notes:
  - "Check project_contract.yml protected_behaviors before any edit."
  - "Human approval required for high-risk operations listed in project_contract.yml."
  - "Run record schema defined in .project-memory/run-record.schema.yml — see contract ids agents.run-record.* for rules."
  - "Run record schema hardened in PR 0019 — run_record_path and run_id reference semantics required by Apply Gate."
  - "Apply Gate contract defined in .project-memory/apply-gate.schema.yml — see contract ids agents.apply-gate.* for rules."
  - "Apply Gate defines human/HITL canonical write authorization and does not perform apply."
  - "Workspace Feature Record is contract-only in PR 0024. No .ariadne/** or feature instances introduced."
  - "Future work: .ariadne/features/{id}.yml storage and Context Steward archival runner implementation."
  - ".ariadne/features/{id}.yml is the future physical storage path for Workspace Feature Records (ADR 0001)."
  - "PR 0025 creates no actual .ariadne/** files. Only ADR, contract ids, anchors, and references are added."
  - "Context Steward archival is contract-only in PR 0026. No runtime implementation."
  - "Future destination: .ariadne/features/{feature_workspace_id}.yml (Context Steward writes)."
  - "Task Intake Request Contract is contract-only in PR 0028. No service code changes."
  - "Runner handoff from Task Intake requires a future Task Intake → Runner Handoff Contract."
  - "Task Intake → Runner Handoff is contract-only in PR 0029. No runtime implementation."
  - "Runner invocation remains forbidden in PR 0029."
  - "Run record creation remains forbidden in PR 0029."
  - ".ariadne/** writes remain forbidden in PR 0029."
  - "Model routing methodology defined in docs/adr/0002-model-selection-methodology.md."
  - "Model routing is contract-only in PR 0032. No implementation of ModelRouter, ContextStressProfiler, or ModelProfile classes."
  - "No model names hardcoded as contract values. Model capability profiles are runtime data."
  - "ModelRouter implementation is future work."
  - "State-First is contract-only in PR 0035. state_core/ implementation is future work."
  - "Events are not banned. Events at boundary, state at core."
  - "Event-driven subsystem without state projection is HIGH RISK for AI modification."
  - "Review artifacts are evidence only and do not bypass apply-gate."
  - "Review artifacts do not replace run records."
  - "Future PRs should save plan-review.yml and precommit-review.yml under .project-memory/pr/<pr-id>/reviews/."
  - "PR 0036 does not retroactively migrate old reviews."
  - "Review artifact workflow adopted manually in PR 0037."
  - "Review artifacts are evidence only, do not bypass apply-gate, and do not replace run records."
  - "Agents configs are not changed in PR 0037. Future PR may update agents after manual workflow is established."
